# ============================================================
# Village Plugin - Konfiguration
# ============================================================

# --- Allgemein ---
storage:
  type: YAML  # YAML oder MYSQL (vorbereitet)

# --- Nachrichten ---
messages:
  prefix: "&8[&6Dorf&8] &7"
  no-permission: "&cDu hast keine Berechtigung."
  player-only: "&cNur Spieler koennen diesen Befehl verwenden."
  village-not-found: "&cDorf nicht gefunden."
  already-in-village: "&cDu bist bereits in einem Dorf."
  village-created: "&aDorf &e%name% &awurde gegruendet!"
  village-deleted: "&cDorf &e%name% &cwurde geloescht."
  village-joined: "&aDu bist dem Dorf &e%name% &abeigetreten."
  village-left: "&eDu hast das Dorf &e%name% &everlassen."
  join-request-created: "&aDeine Beitrittsanfrage fuer &e%name% &awurde gesendet."
  join-request-already-exists: "&eDu hast bereits eine offene Beitrittsanfrage fuer &6%name%&e."
  join-request-notify: "&e%player% &7moechte dem Dorf &6%name% &7beitreten."
  join-request-review-clickable: "&7Klicke auf [ANNEHMEN]/[ABLEHNEN] in der Chat-Nachricht."
  join-request-accepted: "&aDeine Beitrittsanfrage fuer &e%name% &awurde angenommen."
  join-request-declined: "&cDeine Beitrittsanfrage fuer &e%name% &cwurde abgelehnt."
  join-request-accepted-admin: "&a%player% &7wurde in das Dorf &e%name% &7aufgenommen."
  join-request-declined-admin: "&eDie Beitrittsanfrage von &6%player% &efuer &6%name% &ewurde abgelehnt."
  border-set: "&aGrenze wurde gesetzt!"
  border-invalid: "&cUngueltige Grenze! An jeder Stelle muss ein %size%x%size% Quadrat platzierbar sein."
  border-invalid-walk: "&cUngueltige Grenze! Die Grenzziehung konnte nicht abgeschlossen werden (z.B. ungueltiger Verlauf, keine gueltige Verbindung zur bestehenden Grenze oder zu viele Schritte beim Schliessen)."
  border-preview-start: "&aVorschau der Grenze wird angezeigt..."
  border-preview-end: "&eVorschau beendet."
  building-placed: "&aGebaeude &e%building% &awurde platziert."
  building-completed: "&aGebaeude &e%building% &awurde fertiggestellt!"
  building-invalid: "&cDas Gebaeude stimmt nicht mit der Vorlage ueberein."
  building-inside-default-border: "&cGebaeude duerfen nicht nur in der Default-Grenze (ID 0) liegen, wenn es Erweiterungsflaechen gibt."
  sign-reveal-warning: "&eAm Schild-Ort steht bereits ein Block. Bitte bestaetigen."
  member-remove-confirm: "&eMitglied wirklich entfernen?"
  level-up: "&aDorf &e%name% &aist jetzt Level &e%level%&a!"
  points-gained: "&a+%points% Dorfpunkte"
  upgrade-purchased: "&aUpgrade &e%upgrade% &awurde freigeschaltet!"
  upgrade-too-expensive: "&cNicht genuegend Geld oder Punkte."
  villager-spawned: "&aEin neuer Dorfbewohner ist erschienen!"
  name-prompt: "&eBitte gib den Namen des Dorfes im Chat ein:"
  border-walk-start: "&aLaufe die Grenze ab. Nicht diagonal! Rechtsklick zum Bestaetigen."
  border-walk-stop: "&eGrenzauswahl beendet."
  coord-prompt-1: "&eGib den ersten Punkt ein (x z):"
  coord-prompt-2: "&eGib den zweiten Punkt ein (x z):"

# --- Dorfgruendung ---
founding:
  # Brunnenstruktur: Wasser -> max Luft -> Glocke
  well:
    max-air-blocks: 10
  # Voraussetzungen
  requirements:
    permission: "village.create"
    money: 1000.0  # Vault, 0 = deaktiviert
    items:
      - material: EMERALD
        amount: 16
      - material: OAK_LOG
        amount: 64

# --- Gebietssystem ---
territory:
  # Maximale horizontale Flaeche in Bloecken^2
  max-area: 10000
  # Hoehe relativ zur Glocke
  height-above: 64
  height-below: 64
  # Initiales Startgebiet (Quadrat um Brunnen)
  initial-size: 21  # muss ungerade sein, sonst +1
  # Grenzvalidierung: Mindestgroesse fuer Quadrat-Check
  min-square-size: 3
  # Vorschau-Block (clientseitig)
  preview-block: REDSTONE_ORE
  # Vorschau-Dauer in Sekunden
  preview-duration: 30
  # Auswahlmethoden: COORDINATES, WALK, BOTH
  selection-method: BOTH
  # Debug-Logging fuer Grenzziehung zu Fuss
  debug-walk-border: false

# --- Level-System ---
levels:
  max-level: 50
  points-per-level:
    - level: 1
      points: 100
    - level: 5
      points: 250
    - level: 10
      points: 500
    - level: 20
      points: 1000
    - level: 30
      points: 2000
    - level: 40
      points: 5000
    - level: 50
      points: 10000
  # Punkte-Quellen
  point-sources:
    block-place: 1
    block-break: 1
    mob-kill: 5
    villager-production: 2
    building-complete: 50
    trade: 3

# --- Upgrades ---
upgrades:
  border-expansion:
    display-name: "&aGrenzerweiterung"
    description: "Erweitert die maximale Dorfflaeche"
    icon: MAP
    max-level: 10
    cost-per-level: 500.0
    points-per-level: 100
    area-per-level: 2000
  max-villagers:
    display-name: "&aMax. Dorfbewohner"
    description: "Erhoeht die maximale Anzahl an Dorfbewohnern"
    icon: VILLAGER_SPAWN_EGG
    max-level: 10
    cost-per-level: 300.0
    points-per-level: 50
    villagers-per-level: 2
  production-speed:
    display-name: "&aProduktionsgeschwindigkeit"
    description: "Beschleunigt die Produktion aller Dorfbewohner"
    icon: CLOCK
    max-level: 5
    cost-per-level: 1000.0
    points-per-level: 200
    speed-multiplier-per-level: 0.1
  new-professions:
    display-name: "&aNeue Berufe"
    description: "Schaltet neue Berufe fuer Dorfbewohner frei"
    icon: BOOK
    max-level: 5
    cost-per-level: 750.0
    points-per-level: 150
  taxes:
    display-name: "&aSteuern & Zoelle"
    description: "Ermoeglicht Steuereinnahmen von Besuchern"
    icon: GOLD_INGOT
    max-level: 3
    cost-per-level: 2000.0
    points-per-level: 500
    tax-rate-per-level: 0.05
  building-unlock:
    display-name: "&aGebaeude freischalten"
    description: "Schaltet neue Gebaeudetypen frei"
    icon: BRICKS
    max-level: 8
    cost-per-level: 600.0
    points-per-level: 120
  max-members:
    display-name: "&aMax. Spieler"
    description: "Erhoeht die maximale Spieleranzahl im Dorf"
    icon: PLAYER_HEAD
    max-level: 10
    cost-per-level: 400.0
    points-per-level: 80
    members-per-level: 3
  defense:
    display-name: "&aVerteidigung"
    description: "Verbessert die Verteidigungsanlagen"
    icon: SHIELD
    max-level: 5
    cost-per-level: 1500.0
    points-per-level: 300

# --- Rollen-Upgrades ---
role-upgrades:
  role_hr:
    display-name: "&aHR"
    icon: WRITABLE_BOOK
    money-cost: 2000.0
    points-cost: 500
  role_baumeister:
    display-name: "&aBaumeister"
    icon: BRICKS
    money-cost: 2000.0
    points-cost: 500
  role_builder:
    display-name: "&aBuilder"
    icon: IRON_PICKAXE
    money-cost: 1500.0
    points-cost: 350
  role_haendler:
    display-name: "&aHaendler"
    icon: EMERALD
    money-cost: 1800.0
    points-cost: 400
  role_trainer:
    display-name: "&aTrainer"
    icon: EXPERIENCE_BOTTLE
    money-cost: 1800.0
    points-cost: 400

# --- Gebaeude ---
buildings:
  types:
    house:
      display-name: "&aWohnhaus"
      description: "Bietet Platz fuer Dorfbewohner"
      icon: OAK_DOOR
      villager-capacity: 2
      cost: 200.0
      required-level: 1
      schematic: "house.schem"
      locations:
        bed1:
          x: 2
          y: 1
          z: 2
        bed2:
          x: -2
          y: 1
          z: 2
    farm:
      display-name: "&aFarm"
      description: "Produziert Nahrung"
      icon: WHEAT
      villager-capacity: 1
      cost: 150.0
      required-level: 2
      schematic: "farm.schem"
      locations:
        workstation:
          x: 0
          y: 1
          z: 0
      workstation-block: FARMLAND
    shop:
      display-name: "&aGeschaeft"
      description: "Ermoeglicht Handel"
      icon: CHEST
      villager-capacity: 1
      cost: 500.0
      required-level: 5
      schematic: "shop.schem"
      locations:
        workstation:
          x: 0
          y: 1
          z: 0
        storage:
          x: 2
          y: 1
          z: -2
      workstation-block: CHEST
    barracks:
      display-name: "&aKaserne"
      description: "Bildet Wachen aus"
      icon: IRON_SWORD
      villager-capacity: 3
      cost: 800.0
      required-level: 8
      schematic: "barracks.schem"
    watchtower:
      display-name: "&aWachturm"
      description: "Erhoeht den Verteidigungsradius"
      icon: SPYGLASS
      villager-capacity: 1
      cost: 600.0
      required-level: 6
      schematic: "watchtower.schem"
    wall:
      display-name: "&aMauer"
      description: "Schuetzt das Dorf"
      icon: STONE_BRICKS
      villager-capacity: 0
      cost: 100.0
      required-level: 3
      schematic: "wall.schem"
    factory:
      display-name: "&aFabrik"
      description: "Verarbeitet Rohstoffe"
      icon: FURNACE
      villager-capacity: 2
      cost: 1000.0
      required-level: 10
      schematic: "factory.schem"
    storage:
      display-name: "&aLager"
      description: "Lagert Items fuer das Dorf"
      icon: BARREL
      villager-capacity: 1
      cost: 300.0
      required-level: 3
      schematic: "storage.schem"
    road:
      display-name: "&aWeg"
      description: "Verbindet Gebaeude und beschleunigt Dorfbewohner"
      icon: GRAVEL
      villager-capacity: 0
      cost: 50.0
      required-level: 1
      schematic: "road.schem"
    library:
      display-name: "&aBibliothek"
      description: "Erforscht neue Technologien"
      icon: BOOKSHELF
      villager-capacity: 2
      cost: 750.0
      required-level: 7
      schematic: "library.schem"
    tavern:
      display-name: "&aTaverne"
      description: "Erhoeht die Moral der Dorfbewohner"
      icon: BREWING_STAND
      villager-capacity: 1
      cost: 400.0
      required-level: 4
      schematic: "tavern.schem"
    marketplace:
      display-name: "&aMarktplatz"
      description: "Zentraler Handelsplatz"
      icon: EMERALD
      villager-capacity: 3
      cost: 1200.0
      required-level: 12
      schematic: "marketplace.schem"

# --- Dorfbewohner ---
villagers:
  base-max: 5
  # Berufe
  professions:
    farmer:
      display-name: "&aBauer"
      icon: WHEAT_SEEDS
      produces:
        - WHEAT
        - CARROT
        - POTATO
      production-interval-seconds: 300
      required-level: 1
      skin-name: "farmer"
      activity-sequence:
        wake-up:
          type: "TRAVEL_TO"
          location-key: "workstation"
          duration-ticks: 200
          interruptable: true
          description: "Geht zur Farm"
        work-morning:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 1200
          interruptable: false
          description: "Arbeitet auf der Farm"
        lunch-break:
          type: "IDLE"
          location-key: ""
          duration-ticks: 600
          interruptable: true
          description: "Mittagspause"
        work-afternoon:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 1200
          interruptable: false
          description: "Arbeitet weiter"
        go-home:
          type: "SLEEP"
          location-key: ""
          duration-ticks: 200
          interruptable: true
          description: "Geht schlafen"
    miner:
      display-name: "&aBergarbeiter"
      icon: IRON_PICKAXE
      produces:
        - COBBLESTONE
        - IRON_ORE
        - COAL
      production-interval-seconds: 600
      required-level: 3
      skin-name: "miner"
      activity-sequence:
        prepare:
          type: "PREPARE"
          location-key: "storage"
          duration-ticks: 200
          interruptable: true
          description: "Bereitet Werkzeuge vor"
        work:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 2400
          interruptable: false
          description: "Abbaut Erz"
        rest:
          type: "IDLE"
          location-key: ""
          duration-ticks: 400
          interruptable: true
          description: "Kurze Pause"
    lumberjack:
      display-name: "&aHolzfaeller"
      icon: IRON_AXE
      produces:
        - OAK_LOG
        - BIRCH_LOG
        - SPRUCE_LOG
      production-interval-seconds: 400
      required-level: 2
      skin-name: "lumberjack"
      activity-sequence:
        travel:
          type: "TRAVEL_TO"
          location-key: "workstation"
          duration-ticks: 300
          interruptable: true
          description: "Geht in den Wald"
        work:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 1800
          interruptable: false
          description: "Faellt Baeume"
        return:
          type: "TRAVEL_TO"
          location-key: "storage"
          duration-ticks: 300
          interruptable: true
          description: "Bringt Holz zurueck"
    blacksmith:
      display-name: "&aSchmied"
      icon: ANVIL
      produces:
        - IRON_INGOT
        - GOLD_INGOT
      production-interval-seconds: 900
      required-level: 5
    guard:
      display-name: "&aWache"
      icon: IRON_SWORD
      produces: []
      production-interval-seconds: 0
      required-level: 4
    merchant:
      display-name: "&aHaendler"
      icon: EMERALD
      produces: []
      production-interval-seconds: 0
      required-level: 6
    scholar:
      display-name: "&aGelehrter"
      icon: BOOK
      produces: []
      production-interval-seconds: 0
      required-level: 8
    baker:
      display-name: "&aBaecker"
      icon: BREAD
      produces:
        - BREAD
        - CAKE
        - COOKIE
      production-interval-seconds: 450
      required-level: 3
  # Tagesablauf (Ticks)
  schedule:
    wake-up: 0       # 06:00
    work-start: 2000  # 08:00
    lunch: 6000       # 12:00
    work-end: 10000   # 16:00
    sleep: 13000      # 19:00
  # Beduerfnisse
  needs:
    hunger:
      decay-per-minute: 2.0
      critical-threshold: 20.0
    happiness:
      decay-per-minute: 1.0
      critical-threshold: 30.0
  # Skill-Baeume
  skill-tree:
    max-skill-level: 10
    xp-per-level: 100
