# Building settings split from config.yml
#
# Konzept:
# - Schematics für Gebäude, optional mit Variationen wie house_001.schem, house_002.schem
# - Admins können ingame neue Schematics erstellen und ins System integrieren, ohne WorldEdit nutzen zu müssen
# - Manuelles Bauen über das Gebäudemenü sowie Villager-Bauphasen mit Materialentnahme aus Dorftruhen oder Spielerinventar
# - Upgrades haben eigene Permissions und können Achievement-Benachrichtigungen oder kommandobasierte Effekte auslösen
# - Workstationblocks sind pro Gebäude konfigurierbar, inklusive Betten, Kisten, Arbeitsblöcken und Pauseblöcken
# - Pfade entstehen durch ein Ablaufen, nicht durch Schematics, und bilden einen gewichteten Graphen für Villager-Route
#
buildings:
  types:
    house:
      display-name: "&aWohnhaus"
      description: "Bietet Platz fuer Dorfbewohner"
      icon: OAK_DOOR
      villager-capacity: 2
      cost:
        global: 200.0
        local: 0.0
      required-level: 1
      max-level: 5
      upgrade-required-village-level: 2
      upgrade-required-unlock: "house_bed_expansion"
      upgrade-cost-per-level:
        global: 150.0
        local: 30.0
      upgrade-points-per-level: 25
      schematic: "house.schem"
    farm:
      display-name: "&aFarm"
      description: "Produziert Nahrung"
      icon: WHEAT
      villager-capacity: 1
      cost:
        global: 150.0
        local: 0.0
      required-level: 2
      max-level: 4
      upgrade-required-village-level: 3
      upgrade-required-unlock: "farm_composting"
      upgrade-cost-per-level:
        global: 200.0
        local: 40.0
      upgrade-points-per-level: 30
      schematic: "farm.schem"
      workstation-block: FARMLAND
      workstation-blocks:
        workstation: FARMLAND
        workstation_compost: COMPOSTER
        workstation_mill: CRAFTING_TABLE
    shop:
      display-name: "&aGeschaeft"
      description: "Ermoeglicht Handel"
      icon: CHEST
      villager-capacity: 1
      cost:
        global: 500.0
        local: 0.0
      required-level: 5
      schematic: "shop.schem"
      workstation-block: CHEST
      workstation-blocks:
        workstation: CHEST
        storage: BARREL
    barracks:
      display-name: "&aKaserne"
      description: "Bildet Wachen aus"
      icon: IRON_SWORD
      villager-capacity: 3
      cost:
        global: 800.0
        local: 0.0
      required-level: 8
      schematic: "barracks.schem"
    watchtower:
      display-name: "&aWachturm"
      description: "Erhoeht den Verteidigungsradius"
      icon: SPYGLASS
      villager-capacity: 1
      cost:
        global: 600.0
        local: 0.0
      required-level: 6
      schematic: "watchtower.schem"
    wall:
      display-name: "&aMauer"
      description: "Schuetzt das Dorf"
      icon: STONE_BRICKS
      villager-capacity: 0
      cost:
        global: 100.0
        local: 0.0
      required-level: 3
      schematic: "wall.schem"
    factory:
      display-name: "&aFabrik"
      description: "Verarbeitet Rohstoffe"
      icon: FURNACE
      villager-capacity: 2
      cost:
        global: 1000.0
        local: 0.0
      required-level: 10
      schematic: "factory.schem"
    storage:
      display-name: "&aLager"
      description: "Lagert Items fuer das Dorf"
      icon: BARREL
      villager-capacity: 1
      cost:
        global: 300.0
        local: 0.0
      required-level: 3
      schematic: "storage.schem"
    road:
      display-name: "&aWeg"
      description: "Verbindet Gebaeude und beschleunigt Dorfbewohner"
      icon: GRAVEL
      villager-capacity: 0
      cost:
        global: 50.0
        local: 0.0
      required-level: 1
      schematic: "road.schem"
    library:
      display-name: "&aBibliothek"
      description: "Erforscht neue Technologien"
      icon: BOOKSHELF
      villager-capacity: 2
      cost:
        global: 750.0
        local: 0.0
      required-level: 7
      schematic: "library.schem"
    tavern:
      display-name: "&aTaverne"
      description: "Erhoeht die Moral der Dorfbewohner"
      icon: BREWING_STAND
      villager-capacity: 1
      cost:
        global: 400.0
        local: 0.0
      required-level: 4
      schematic: "tavern.schem"
    marketplace:
      display-name: "&aMarktplatz"
      description: "Zentraler Handelsplatz"
      icon: EMERALD
      villager-capacity: 3
      cost:
        global: 1200.0
        local: 0.0
      required-level: 12
      schematic: "marketplace.schem"

# =============================================================
#  NEUE GEBÄUDE-DEFINITIONEN (area-/WB-basiert, kein Schematic)
#
#  validation_mode: schematic   -> BuildingService + WorldEdit
#  validation_mode: block_check -> Plugin prüft Blöcke im Bereich
#
#  build_cost:
#    items: { STONE: 32 }
#    money: 100            # globale Währung über Vault
#    money_local: 50       # optional: lokale Dorfcurrency
# =============================================================

settings:
  path_surface_mode: skylight
  path_surface_min_skylight: 1
  production_level_bonus_per_tier: 0.10
  villager_fetch_radius: 64

# Reihenfolge und sichtbare Ordner im GUI (optional)
menu_categories:
  - Allgemeine Gebäude
  - Dorfzentrum
  - Wohnen
  - Pfade
  - Bezirke
  - Außenposten
  - Handel
  - Produktion
  - Factory
  - Zerstreuung
  - Forschung
  - Medizin
  - Sicherheit und Verteidigung

categories:

  # -----------------------------------------------------------
  #  ALLGEMEIN (general)
  # -----------------------------------------------------------
  general:
    name: "Allgemeine Gebäude"
    permission: "village.building.general"
    icon: OAK_PLANKS
    buildings:

      dorfzentrum:
        name: "Dorfzentrum"
        description: "Das Herz des Dorfes."
        permission: "village.building.general.dorfzentrum"
        icon: BELL
        show_in_menu: false
        requires_village_level: 1
        validation_mode: schematic
        schematic: "dorfzentrum.schem"
        workstation_blocks: [BELL]
        area:
          shape: circle
          min_radius: 5
          max_radius: 10
        villager_slots: 0
        build_cost:
          items: { OAK_PLANKS: 32, STONE: 16 }
          money: 0
        upgrades:
          tier_2:
            name: "Erweitertes Dorfzentrum"
            permission: "village.building.general.dorfzentrum.upgrade.2"
            requires_village_level: 3
            achievement: "Upgrade Dorfzentrum freigeschaltet!"
            commands:
              - "say Das Dorfzentrum wurde erweitert!"
            build_cost:
              items: { STONE_BRICKS: 64, OAK_LOG: 32 }
              money: 100
          tier_3:
            name: "Prächtiges Dorfzentrum"
            permission: "village.building.general.dorfzentrum.upgrade.3"
            requires_village_level: 6
            achievement: "Großes Dorfzentrum freigeschaltet!"
            commands:
              - "say Das Dorfzentrum ist nun prächtig!"
            build_cost:
              items: { CHISELED_STONE_BRICKS: 64, IRON_INGOT: 16 }
              money: 500
          small_storage:
            name: "Kleines Lager (Upgrade)"
            permission: "village.building.general.dorfzentrum.upgrade.small_storage"
            requires_village_level: 2
            achievement: "Kleines Lager freigeschaltet!"
            commands:
              - "say Kleines Lager freigeschaltet für %village%!"
            chest:
              initial_slots: 9
              max_upgradeable_slots: 54
              public: true
              villager_accessible: true
            build_cost:
              items: { OAK_LOG: 16, OAK_PLANKS: 32 }
              money: 0

      dorfbrunnen:
        name: "Dorfbrunnen"
        description: "Zentraler Treffpunkt für Dorfbewohner."
        permission: "village.building.general.dorfbrunnen"
        icon: WATER_BUCKET
        requires_village_level: 1
        validation_mode: block_check
        required_blocks:
          WATER: 4
        workstation_blocks: [BELL]
        area:
          shape: circle
          min_radius: 3
          max_radius: 6
        build_cost:
          items: { STONE: 32, WATER_BUCKET: 1 }
          money: 0
          money_local: 5

      # kleines_lager wurde in ein Upgrade des Dorfzentrums verschoben (siehe dorfzentrum.upgrades.small_storage)

      marktplatz:
        name: "Marktplatz"
        description: "Zentraler Handelsort im Dorfzentrum."
        permission: "village.building.general.marktplatz"
        icon: EMERALD
        requires_village_level: 2
        validation_mode: schematic
        schematic: "marktplatz.schem"
        workstation_blocks: [OAK_SIGN]
        additional_workstation_blocks:
          kiste:
            type: CHEST
            label: "Handelstruhe"
            required: true
            count_min: 1
            count_max: 2
            public: true
            villager_accessible: true
        area:
          shape: rectangle
          min_size: "5x5"
          max_size: "15x15"
        chest:
          initial_slots: 18
          max_upgradeable_slots: 54
        villager_slots: 2
        build_cost:
          items: { OAK_PLANKS: 64, EMERALD: 5 }
          money: 100

      laterne:
        name: "Laterne"
        description: "Beleuchtung für die Wege."
        permission: "village.building.general.laterne"
        icon: LANTERN
        requires_village_level: 1
        validation_mode: block_check
        required_blocks:
          LANTERN: 1
        workstation_blocks: [LANTERN]
        area:
          shape: rectangle
          min_size: "1x1"
          max_size: "2x2"
        build_cost:
          items: { LANTERN: 1, COBBLESTONE_WALL: 2 }
          money: 5

      hafen:
        name: "Hafen"
        description: "Anlegestelle für Boote und Warenumschlag."
        permission: "village.building.general.hafen"
        icon: OAK_BOAT
        requires_village_level: 3
        validation_mode: schematic
        schematic: "hafen.schem"
        workstation_blocks: [BARREL]
        area:
          shape: rectangle
          min_size: "6x6"
          max_size: "15x20"
        build_cost:
          items: { OAK_LOG: 32, OAK_PLANKS: 64, BARREL: 2 }
          money: 200

      forst:
        name: "Forst"
        description: "Waldgebiet unter freiem Himmel mit Bäumen."
        permission: "village.building.general.forst"
        icon: OAK_LOG
        requires_village_level: 2
        validation_mode: block_check
        required_blocks:
          OAK_LOG: 5
          SPRUCE_LOG: 5
          BIRCH_LOG: 5
        required_block_percentage:
          block: OAK_LEAVES
          percentage: 40
        workstation_blocks: [OAK_LOG, SPRUCE_LOG, BIRCH_LOG, DARK_OAK_LOG]
        area:
          shape: rectangle
          min_size: "5x5"
          max_size: "50x50"
        build_cost:
          items: { SAPLING: 8 }
          money: 50
          money_local: 20

      acker:
        name: "Acker"
        description: "Anbaufläche mit Wasser und Grasblöcken."
        permission: "village.building.general.acker"
        icon: WHEAT
        requires_village_level: 2
        validation_mode: block_check
        required_blocks:
          WATER: 1
          FARMLAND: 8
        workstation_blocks: [FARMLAND, WATER, COMPOSTER]
        area:
          shape: rectangle
          min_size: "3x3"
          max_size: "20x20"
        build_cost:
          items: { WATER_BUCKET: 1, HOES: 4 }
          money: 30
          money_local: 10

      beet:
        name: "Blumenbeet"
        description: "Pflanzenbeet für Blumen und Pilze."
        permission: "village.building.general.beet"
        icon: POPPY
        requires_village_level: 1
        validation_mode: block_check
        required_blocks:
          GRASS_BLOCK: 4
          DIRT: 4
        workstation_blocks: [GRASS_BLOCK, DIRT, COARSE_DIRT]
        area:
          shape: rectangle
          min_size: "2x2"
          max_size: "10x10"
        build_cost:
          items: { POPPY: 4, DANDELION: 4 }
          money: 20

      tierzucht:
        name: "Tierzucht"
        description: "Einfriedetes Gebiet für Tiere mit Zäunen und Tor."
        permission: "village.building.general.tierzucht"
        icon: CHICKEN_SPAWN_EGG
        requires_village_level: 3
        validation_mode: block_check
        required_blocks:
          OAK_FENCE: 8
          OAK_FENCE_GATE: 1
        workstation_blocks: [OAK_FENCE, OAK_FENCE_GATE]
        area:
          shape: circle
          min_radius: 3
          max_radius: 15
        build_cost:
          items: { OAK_LOG: 16, OAK_FENCE: 8, OAK_FENCE_GATE: 1, HAY_BLOCK: 4 }
          money: 100

  wohnen:
    name: "Wohnen"
    permission: "village.building.wohnen"
    icon: RED_BED
    buildings:

      baracke:
        name: "Notunterkunft"
        description: "Einfache Unterkunft aus beliebigen Blöcken - Raum mit Wänden, Decke und Boden nötig."
        permission: "village.building.wohnen.baracke"
        icon: OAK_DOOR
        requires_village_level: 1
        validation_mode: block_check
        area:
          shape: hollow_structure
          min_interior_volume: 8
          max_interior_volume: 200
        workstation_blocks: [WHITE_BED, ORANGE_BED, MAGENTA_BED, LIGHT_BLUE_BED, YELLOW_BED, LIME_BED, PINK_BED, GRAY_BED, LIGHT_GRAY_BED, CYAN_BED, PURPLE_BED, BLUE_BED, BROWN_BED, GREEN_BED, RED_BED, BLACK_BED]
        villager_slots: 2
        passive_effects:
          sleep_slots: 2
        build_cost:
          items: { OAK_LOG: 8, OAK_PLANKS: 16 }
          money: 0
        upgrades:
          tier_2:
            name: "Ausgebaute Notunterkunft"
            permission: "village.building.wohnen.baracke.upgrade.2"
            passive_effects: { sleep_slots: 4 }
            villager_slots: 4
            build_cost: { items: { OAK_PLANKS: 64, GLASS: 4, OAK_DOOR: 2 }, money: 50 }

      wohnhaus:
        name: "Wohnhaus"
        description: "Gemütliches Wohnhaus für Bürger. (WB: Bett, Truhe)"
        permission: "village.building.wohnen.wohnhaus"
        icon: RED_BED
        requires_village_level: 2
        validation_mode: schematic
        schematic: "wohnhaus.schem"
        workstation_blocks: [WHITE_BED, ORANGE_BED, MAGENTA_BED, LIGHT_BLUE_BED, YELLOW_BED, LIME_BED, PINK_BED, GRAY_BED, LIGHT_GRAY_BED, CYAN_BED, PURPLE_BED, BLUE_BED, BROWN_BED, GREEN_BED, RED_BED, BLACK_BED]
        additional_workstation_blocks:
          truhe:
            type: CHEST
            label: "Wohntruhe"
            required: true
            count_min: 1
            count_max: 4
        area:
          shape: rectangle
          min_size: "4x4"
          max_size: "10x10"
        chest:
          initial_slots: 9
          max_upgradeable_slots: 27
        villager_slots: 2
        passive_effects:
          sleep_slots: 2
        build_cost:
          items: { OAK_PLANKS: 64, GLASS: 4, RED_BED: 2 }
          money: 50
        upgrades:
          tier_2:
            name: "Großes Wohnhaus"
            permission: "village.building.wohnen.wohnhaus.upgrade.2"
            achievement: "Wohnhaus verbessert!"
            commands:
              - "say Das Wohnhaus bietet jetzt noch mehr Platz."
            passive_effects: { sleep_slots: 4 }
            villager_slots: 4
            build_cost: { items: { STONE_BRICKS: 32, GLASS: 4, WHITE_BED: 2 }, money: 100 }

  # -----------------------------------------------------------
  #  PFADE (paths)
  # -----------------------------------------------------------
  paths:
    name: "Pfade & Wege"
    permission: "village.building.paths"
    icon: DIRT_PATH
    buildings:

      trampelpfad:
        name: "Trampelpfad"
        description: "3 Blöcke breiter Pfad. Villager laufen ihn frei."
        permission: "village.building.paths.trampelpfad"
        icon: DIRT_PATH
        requires_village_level: 1
        type: path
        path:
          width: 3
          visualize_border_block: YELLOW_CONCRETE_POWDER
          surface_check_mode: skylight
          required_surface_block: DIRT_PATH
          required_surface_percentage: 60
          valid_surface_blocks: [DIRT_PATH]
          valid_base_blocks: [DIRT, DIRT_PATH, GRASS_BLOCK, COARSE_DIRT]
          speed_effect:
            amplifier: 0
            duration_after_leave_ticks: 60
        build_cost:
          items: { STICK: 4 }
          money: 0
        upgrades:
          tier_2:
            name: "Befestigter Trampelpfad"
            permission: "village.building.paths.trampelpfad.upgrade.2"
            path:
              speed_effect: { amplifier: 0, duration_after_leave_ticks: 100 }
            build_cost: { items: { GRAVEL: 16 }, money: 10 }
          tier_3:
            name: "-> Straße"
            permission: "village.building.paths.trampelpfad.upgrade.3"
            upgrades_to: strasse
            build_cost: { items: { COBBLESTONE: 64, GRAVEL: 32 }, money: 100 }

      strasse:
        name: "Straße"
        description: "Gepflasterte Straße. Schnellerer Transport."
        permission: "village.building.paths.strasse"
        icon: COBBLESTONE
        requires_village_level: 2
        type: path
        path:
          width: 3
          width_upgradeable: true
          max_width: 5
          visualize_border_block: WHITE_CONCRETE_POWDER
          surface_check_mode: skylight
          required_surface_block: COBBLESTONE
          required_surface_percentage: 70
          valid_surface_blocks: [COBBLESTONE, STONE_BRICKS, GRAVEL, STONE_SLAB]
          speed_effect:
            amplifier: 1
            duration_after_leave_ticks: 120
        build_cost:
          items: { COBBLESTONE: 32 }
          money: 50
        upgrades:
          tier_2:
            name: "Gepflasterte Straße (5 breit)"
            permission: "village.building.paths.strasse.upgrade.2"
            path:
              width: 5
              speed_effect: { amplifier: 1, duration_after_leave_ticks: 200 }
            build_cost: { items: { STONE_BRICKS: 64, IRON_INGOT: 4 }, money: 200 }
          tier_3:
            name: "-> Schiene"
            permission: "village.building.paths.strasse.upgrade.3"
            upgrades_to: schiene
            build_cost: { items: { RAIL: 64, IRON_INGOT: 8 }, money: 300 }

      schiene:
        name: "Schiene"
        description: "Schienenweg für den Lorentransport."
        permission: "village.building.paths.schiene"
        icon: RAIL
        requires_village_level: 4
        type: path
        path:
          width: 1
          visualize_border_block: RED_CONCRETE_POWDER
          surface_check_mode: skylight
          required_surface_block: RAIL
          required_surface_percentage: 90
          valid_surface_blocks: [RAIL, POWERED_RAIL, DETECTOR_RAIL, ACTIVATOR_RAIL]
          valid_base_blocks: [GRAVEL, STONE_BRICKS, OAK_PLANKS, COBBLESTONE]
        build_cost:
          items: { RAIL: 16 }
          money: 100

      bruecke:
        name: "Brücke"
        description: "Überbrückt Gewässer und Gräben."
        permission: "village.building.paths.bruecke"
        icon: OAK_SLAB
        requires_village_level: 1
        validation_mode: block_check
        required_blocks:
          OAK_SLAB: 10
        workstation_blocks: [BELL]
        area:
          shape: rectangle
          min_size: "3x5"
          max_size: "6x30"
        build_cost:
          items: { OAK_PLANKS: 32, COBBLESTONE: 32 }
          money: 50

  # -----------------------------------------------------------
  #  BEZIRK (district)
  # -----------------------------------------------------------
  district:
    name: "Bezirke & Erweiterungen"
    permission: "village.building.district"
    icon: BEACON
    buildings:

      wohngebiet:
        name: "Wohngebiet"
        description: "Bezirksbereich zur gesteigerten Expansion."
        permission: "village.building.district.wohngebiet"
        icon: WHITE_BED
        requires_village_level: 3
        type: area
        area:
          shape: rectangle
          min_size: "10x10"
          max_size: "40x40"
        build_cost:
          items: { OAK_LOG: 64, STONE_BRICKS: 64 }
          money: 500

  # -----------------------------------------------------------
  #  AUSSENPOSTEN (outposts)
  # -----------------------------------------------------------
  outposts:
    name: "Außenposten"
    permission: "village.building.outposts"
    icon: CAMPFIRE
    buildings:

      handelsposten:
        name: "Handelsposten"
        description: "Außenposten zum Tausch und zur Güterübergabe."
        permission: "village.building.outposts.handelsposten"
        icon: EMERALD_BLOCK
        requires_village_level: 4
        type: outpost
        validation_mode: schematic
        schematic: "handelsposten.schem"
        outpost:
          requires_outside_all_villages: true
        workstation_blocks: [BELL]
        area:
          shape: rectangle
          min_size: "5x5"
          max_size: "15x15"
        build_cost:
          items: { OAK_LOG: 64, STONE_BRICKS: 64, EMERALD: 10 }
          money: 400

      militaerposten:
        name: "Militärposten"
        description: "Militärische Absicherung im Umland."
        permission: "village.building.outposts.militaerposten"
        icon: IRON_BLOCK
        requires_village_level: 5
        type: outpost
        validation_mode: schematic
        schematic: "militaerposten.schem"
        outpost:
          requires_outside_all_villages: true
        workstation_blocks: [BELL]
        area:
          shape: rectangle
          min_size: "5x5"
          max_size: "15x15"
        build_cost:
          items: { STONE_BRICKS: 128, IRON_BLOCK: 1 }
          money: 500

      forschungsstation:
        name: "Forschungsstation"
        description: "Expeditionslager zur Wissenschaft."
        permission: "village.building.outposts.forschungsstation"
        icon: LECTERN
        requires_village_level: 5
        type: outpost
        validation_mode: schematic
        schematic: "forschungsstation.schem"
        outpost:
          requires_outside_all_villages: true
        workstation_blocks: [LECTERN]
        area:
          shape: rectangle
          min_size: "5x5"
          max_size: "12x12"
        build_cost:
          items: { OAK_PLANKS: 64, GLASS: 16 }
          money: 500

      ausgrabungsstaette:
        name: "Ausgrabungsstätte"
        description: "Archäologisches Grabungsfeld."
        permission: "village.building.outposts.ausgrabungsstaette"
        icon: DIRT
        requires_village_level: 4
        type: outpost
        validation_mode: block_check
        required_blocks:
          DIRT: 16
        workstation_blocks: [BELL]
        area:
          shape: rectangle
          min_size: "6x6"
          max_size: "20x20"
        build_cost:
          items: { DIRT: 64, COBBLESTONE: 64 }
          money: 200

  # -----------------------------------------------------------
  #  HANDEL (trade)
  # -----------------------------------------------------------
  trade:
    name: "Handel & Logistik"
    permission: "village.building.trade"
    icon: CHEST
    buildings:

      shop:
        name: "Shop"
        description: "Kauf- und Verkaufsstelle für Dorfbürger."
        permission: "village.building.trade.shop"
        icon: CHEST
        requires_village_level: 2
        validation_mode: schematic
        schematic: "shop.schem"
        workstation_blocks: [CHEST]
        area:
          shape: rectangle
          min_size: "4x4"
          max_size: "10x10"
        chest:
          initial_slots: 27
