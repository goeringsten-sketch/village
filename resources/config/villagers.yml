    # ── SCHOLAR (Gelehrter) ──────────────────────────────────────────────────
    scholar:
      display-name: "&aGelehrter"
      icon: BOOK
      produces: []
      production-interval-seconds: 0
      required-level: 8
      skin-name: "scholar"
      activity-sequence:
        travel:
          type: "TRAVEL_TO"
          location-key: "workstation"
          duration-ticks: 200
          interruptable: true
          description: "Geht zur Bibliothek"
        study:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 2400
          interruptable: false
          description: "Studiert"
        rest:
          type: "IDLE"
          location-key: ""
          duration-ticks: 600
          interruptable: true
