        sugar: 18
        fats_bad: 2
      COOKED_BEEF:
        hunger: 12
        proteins: 32
        fats_bad: 6
      COOKED_SALMON:
        hunger: 6
        proteins: 20
        fats_good: 8
        omega_3: 6
      BEETROOT_SOUP:
        hunger: 6
        carbohydrates_single: 12
        sugar: 3
      MILK_BUCKET:
        hunger: 4
        proteins: 6
        fats_good: 4
      MUSHROOM_STEW:
        hunger: 5
        proteins: 8
        carbohydrates_single: 12
      RABBIT_STEW:
        hunger: 6
        proteins: 18
        carbohydrates_single: 14
      PUMPKIN_PIE:
        hunger: 8
        carbohydrates_single: 18
        sugar: 18
        fats_bad: 2
      SWEET_BERRIES:
        hunger: 2
