          type: "TRAVEL_TO"
          location-key: "workstation"
          duration-ticks: 300
          interruptable: true
          description: "Geht in den Wald"
        work:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 1800
          interruptable: false
          description: "Faellt Baeume"
        return:
          type: "TRAVEL_TO"
          location-key: "storage"
          duration-ticks: 300
          interruptable: true
          description: "Bringt Holz zurueck"

    # ── BLACKSMITH (Schmied) ─────────────────────────────────────────────────
    blacksmith:
      display-name: "&aSchmied"
      icon: ANVIL
      produces:
        - IRON_INGOT
        - GOLD_INGOT
      production-interval-seconds: 900  # Alle 15 Minuten
