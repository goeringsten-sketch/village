    # ── CARPENTER (Tischler) ─────────────────────────────────────────────────
    carpenter:
      display-name: "&aTischler"
      icon: CRAFTING_TABLE
      # Verarbeitet Rohholz (vom Holzfäller) zu Planken, Treppen und Stielen
