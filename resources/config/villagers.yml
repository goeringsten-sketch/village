        work:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 2000
          interruptable: false
          description: "Behandelt Patienten"
        rest:
          type: "IDLE"
          location-key: ""
          duration-ticks: 400
          interruptable: true
          description: "Pause"

    # ── COURIER (Kurier) ─────────────────────────────────────────────────────
    courier:
      display-name: "&aKurier"
      icon: HOPPER
      produces: []          # Liefert Waren zwischen Gebäuden, produziert nichts
      production-interval-seconds: 0
      required-level: 2
      skin-name: "courier"
      activity-sequence:
        travel:
          type: "TRAVEL_TO"
          location-key: "workstation"
          duration-ticks: 400
          interruptable: true
          description: "Holt Sendungen ab"
        deliver:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 1600
          interruptable: false
          description: "Liefert aus"
        return:
          type: "TRAVEL_TO"
          location-key: "storage"
          duration-ticks: 400
          interruptable: true
          description: "Kehrt zurück"

    # ── CARTOGRAPHER (Kartograph) ────────────────────────────────────────────
    cartographer:
      display-name: "&aKartograph"
      icon: CARTOGRAPHY_TABLE
      produces: []
      production-interval-seconds: 0
      required-level: 3
      skin-name: "cartographer"
      activity-sequence:
        travel:
          type: "TRAVEL_TO"
          location-key: "workstation"
          duration-ticks: 200
          interruptable: true
          description: "Geht zum Kartentisch"
        work:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 1800
          interruptable: false
          description: "Zeichnet Karten"
        rest:
          type: "IDLE"
          location-key: ""
          duration-ticks: 400
          interruptable: true
          description: "Kurze Pause"

    # ── BAKER (Bäcker) ───────────────────────────────────────────────────────
    baker:
      display-name: "&aBaecker"
      icon: BREAD
      produces:
        - BREAD
        - CAKE
        - COOKIE
      production-interval-seconds: 450
      required-level: 3
      skin-name: "baker"
      activity-sequence:
        prepare:
          type: "PREPARE"
          location-key: "storage"
          duration-ticks: 200
          interruptable: true
          description: "Holt Zutaten"
        work:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 1800
          interruptable: false
          description: "Backt"
        lunch:
          type: "IDLE"
          location-key: ""
          duration-ticks: 600
          delay-ticks: 40
          interruptable: true
          actions:
            - "get-food"
            - "eat-food"
          description: "Probiert die Ware"
        rest:
          type: "IDLE"
          location-key: ""
          duration-ticks: 400
          interruptable: true
          description: "Pause"


  # ============================================================================
  #  GLOBALER TAGESABLAUF & ZEITPLAN
  # ============================================================================
  # Bestimmt die globalen Uhrzeiten des NPC-Tages im Minecraft-Tick-Format.
  # Minecraft-Tag: 0 (6:00 Uhr morgens) bis 24000 Ticks (nächster Morgen)
  #
  # Umrechnungshilfe:
  #   0     = 06:00 Uhr (Sonnenaufgang)
  #   2000  = 08:00 Uhr
  #   6000  = 12:00 Uhr (Mittag)
  #   10000 = 16:00 Uhr
  #   13000 = 19:00 Uhr (Sonnenuntergang)
  #   18000 = 00:00 Uhr (Mitternacht)
  schedule:
    wake-up: 0        # Aufstehen (06:00 Uhr)
    get-food: 3000    # Wann Essen gesucht wird, wenn Nährstoffe niedrig (09:00 Uhr)
    work-start: 2000  # Arbeitsbeginn (08:00 Uhr)
    lunch: 6000       # Mittagspause (12:00 Uhr)
    work-end: 10000   # Feierabend (16:00 Uhr)
    sleep: 13000      # Schlafenszeit (19:00 Uhr)

    # Nährstoffverbrauch-Multiplikator je nach aktueller Aktivität.
    # Basis-Verbrauch wird mit diesem Faktor multipliziert.
    # Mögliche Aktivitäts-Keys:
    #   WAKE_UP, WORK, IDLE, SLEEP, GET_FOOD, EAT_FOOD, FLEEING, HEALING
    # Werte: < 1.0 = geringerer Verbrauch, > 1.0 = erhöhter Verbrauch
    #
    # HINWEIS: Dieser Block dient als globaler Fallback für den Scheduler.
    # Wenn der Eintrag unter 'nutrient-storage.decay-by-activity' leer/null ist,
    # wird auf diese Werte ausgewichen.
    nutrient-decay-by-activity:
      WAKE_UP: 0.85
      WORK: 1.20      # Arbeit erhöht den Hunger
      IDLE: 0.35      # Pause verbraucht wenig
      SLEEP: 0.12     # Schlafen verbraucht minimal
      GET_FOOD: 0.95
      EAT_FOOD: 0.20  # Essen verbraucht kaum
      FLEEING: 1.55   # Flucht verbraucht sehr viel
      HEALING: 0.95


  # ============================================================================
  #  NÄHRSTOFF-SPEICHER
  # ============================================================================
  nutrient-storage:
    # Maximale Kapazität pro Nährstofftyp (Wert 0–999; Standard: 100)
    default-capacity-per-nutrient: 100

    # Basis-Abnahme der Nährstoffe pro Minute (Einheiten pro Minute)
    decay-per-minute: 1.0

    # Aktivitätsbasierter Verbrauchsmultiplikator.
    # Mögliche Keys: WAKE_UP, WORK, IDLE, SLEEP, GET_FOOD, EAT_FOOD, FLEEING, HEALING
    #
    # HINWEIS: Dies ist die primäre Definition, die vom Nährstoffsystem ausgelesen wird.
    # Bei fehlenden Werten greift das System auf 'schedule.nutrient-decay-by-activity' zurück.
    decay-by-activity:
      WAKE_UP: 0.85
      WORK: 1.20
      IDLE: 0.35
      SLEEP: 0.12
      GET_FOOD: 0.95
      EAT_FOOD: 0.20
      FLEEING: 1.55
      HEALING: 0.95


  # ============================================================================
  #  GRUNDBEDÜRFNISSE (Needs)
  # ============================================================================
  needs:
    # Hungerbedürfnis – abgeleitet aus den Nährstoffwerten
    hunger:
      # Verfall pro Minute in Einheiten (höher = schneller hungrig)
      decay-per-minute: 2.0
      # Ab diesem Wert (0–100) sucht der NPC dringend nach Essen
      critical-threshold: 20.0
      # Ab diesem Wert erhält der NPC Schaden durch Hunger (0–100)
      damage-threshold: 15
      # Schadensintervall in Ticks bei extremem Hunger (20 Ticks = 1s)
      damage-interval-ticks: 400
      # Schaden pro Intervall in halben Herzen (0.5 = ein Viertel Herz)
      damage-per-interval: 0.5
      # Echter Entity-Schaden bei extremem Hunger (unabhängig vom GUI-Balken)
      entity-damage:
        enabled: false
        amount: 1.0
      # Berechnet den Hunger-Wert aus den aktuellen Nährstoffwerten (true empfohlen)
      display-from-nutrients: true

    # Zufriedenheit (Happiness) – beeinflusst Arbeitsbereitschaft
    happiness:
      decay-per-minute: 1.0
      # Unter diesem Wert verweigert der NPC die Arbeit (0–100)
      critical-threshold: 30.0


  # ============================================================================
  #  NÄHRSTOFFE IM DETAIL
  # ============================================================================
  # Definiert die einzelnen Nährstofftypen, ihre Anzeigenamen und Basisverfallsraten.
  # Manche Nährstoffe haben zusätzliche Effekt-Felder (z.B. omega_3, sugar).
  #
  # Gemeinsame Felder:
  #   display-name: "<Name>"       - Anzeigename im GUI
  #   decay-per-minute: <Zahl>     - Abnahmerate pro Minute (in Einheiten)
  #
  # Erweiterte Felder (für Nährstoffe mit Effekten):
  #   duration-seconds: <Zahl>     - Wie lange ein Effekt nach dem Essen anhält
  #   max-duration-seconds: <Zahl> - Maximale Effektdauer (bei mehrfachem Essen)
  #   stack-duration: true|false   - Ob die Dauer beim erneuten Essen addiert wird
  #   multiplier: <Dezimalzahl>    - Basis-Multiplikator des Effekts
  #   effects:                     - Boni/Mali durch diesen Nährstoff
  #     <effekt-key>: <Wert>       - Mögliche Effekt-Keys:
  #       production-speed         - Produktionsgeschwindigkeit (+/-)
  #       movement-speed           - Bewegungsgeschwindigkeit (+/-)
  #       xp-gain                  - XP-Gewinn (+/-)
  #       build-speed              - Baugeschwindigkeit (+/-)
  #       relationship             - Reputationsänderung (+/-)
  #       communication            - Kommunikationsfähigkeit (+/-)
  #     Wert: Dezimalzahl (0.10 = +10%, -0.05 = -5%)
  #   command-on-consume: "<Befehl>"  - Konsolenbefehl beim Verzehr (Platzhalter: tlb.)
  nutrients:
    proteins:
      display-name: "Eiweiß"
      decay-per-minute: 0.45

    fats_good:
      display-name: "Fette (gut)"
      decay-per-minute: 0.30

    fats_bad:
      display-name: "Fette (gesättigt)"
      decay-per-minute: 0.22

    carbohydrates_single:
      display-name: "Kohlenhydrate (1x)"
      decay-per-minute: 0.70

    carbohydrates_double:
      display-name: "Kohlenhydrate (2x)"
      decay-per-minute: 0.60

    sugar:
      display-name: "Zucker"
      decay-per-minute: 0.55
      duration-seconds: 30
      max-duration-seconds: 90
      effects:
        production-speed: -0.05   # Zu viel Zucker = leichte Produktionsverlangsamung
        movement-speed: 0.08      # Aber schnellere Bewegung (Hyperzustand)

    omega_3:
      display-name: "Omega-3-Fettsäure"
      decay-per-minute: 0.20
      duration-seconds: 60
      max-duration-seconds: 180
      stack-duration: true    # Dauer addiert sich bei mehrfachem Essen
      multiplier: 1.1
      effects:
        production-speed: 0.10  # +10% Produktionsgeschwindigkeit
        movement-speed: 0.05    # +5% Bewegungsgeschwindigkeit
      command-on-consume: "say Villager nutzt Omega-3"


  # ============================================================================
  #  FÜTTERUNG & NÄHRSTOFFWERTE VON LEBENSMITTELN
  # ============================================================================
  # Definiert, welche Items welche Nährstoffe liefern, wenn ein NPC sie isst.
  #
  # AUFBAU UNTER 'recovery':
  #   <Material>:               - Bukkit-Material-Name des Lebensmittels
  #     hunger: <Zahl>          - Hungerwert, der sofort wiederhergestellt wird
  #     <nährstoff-key>: <Zahl> - Nährstoffmenge (Keys aus 'nutrients'-Abschnitt)
  #     instant-percent: <0-100> - Anteil, der sofort wirkt (Rest über recovery-seconds)
  #     recovery-seconds: <Zahl> - Sekunden für verzögerte Nährstoffrückgewinnung
  feeding:
    # Darf der NPC selbstständig Nahrung aus Truhen im Dorf holen?
    allow-self-feeding: true

    # Darf der Spieler den NPC per Rechtsklick mit einem Item füttern?
    allow-player-feeding: true

    # Mindestabstand in Sekunden zwischen zwei Mahlzeiten desselben NPCs
    feed-interval-seconds: 5

    # Standard-Sofortanteil der Nährstoffe bei Nahrungsaufnahme (0–100%)
    default-instant-percent: 100

    # Standard-Zeit für verzögerte Nährstoffrückgewinnung in Sekunden (0 = alles sofort)
    default-recovery-seconds: 0

    # Periodische Nährstoffrückgewinnung (für Recovery-basierte Items)
    periodic-recovery:
      enabled: true
      tick-interval-seconds: 1  # Wie oft die Recovery in Sekunden aktualisiert wird

    # Nährstoffwerte pro Lebensmittel-Item
    # Alle Nährstoff-Keys müssen im 'nutrients'-Abschnitt definiert sein.
