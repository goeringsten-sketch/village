      merchant: 27  # Händler brauchen mehr (volle Waren)
      scholar: 12
      cartographer: 12
      medic: 12
      courier: 27   # Kuriere transportieren viel

    # Zusätzliche Slots pro Skill-Level (stackt sich mit base-slots)
