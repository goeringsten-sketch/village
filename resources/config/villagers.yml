          location-key: "storage"
          duration-ticks: 200
          interruptable: true
          description: "Bereitet Werkzeuge vor"
        work:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 2400
          interruptable: false
          description: "Schmiedet am Amboss"
        lunch:
          type: "IDLE"
          location-key: ""
          duration-ticks: 600
          delay-ticks: 40
          interruptable: true
          actions:
            - "get-food"
            - "eat-food"
          description: "Mittagspause"
        rest:
          type: "IDLE"
          location-key: ""
          duration-ticks: 400
          interruptable: true
          description: "Kurze Pause"

    # ── GUARD (Wache) ────────────────────────────────────────────────────────
    guard:
      display-name: "&aWache"
      icon: IRON_SWORD
      produces: []          # Wachen produzieren keine Items
      production-interval-seconds: 0
      required-level: 4
      skin-name: "guard"
      activity-sequence:
        patrol:
          type: "TRAVEL_TO"
          location-key: "workstation"
          duration-ticks: 400
          interruptable: true
          description: "Patrouilliert"
        watch:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 1800
          interruptable: false
          description: "Steht Wache"
        rest:
          type: "IDLE"
          location-key: ""
          duration-ticks: 400
          interruptable: true
          description: "Pause"

    # ── MERCHANT (Händler) ───────────────────────────────────────────────────
    merchant:
      display-name: "&aHaendler"
      icon: EMERALD
      produces: []
      production-interval-seconds: 0
      required-level: 6
      skin-name: "merchant"
      activity-sequence:
