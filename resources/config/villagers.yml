        instant-percent: 50       # Nur 50% sofort, Rest über Zeit
        recovery-seconds: 20      # Verbleibende 50% über 20 Sekunden


  # ============================================================================
  #  WIEDERBELEBUNG VERSTORBENER DORFBEWOHNER
  # ============================================================================
  revival:
    # Ob Wiederbelebung an der Dorfglocke oder beim Medikus möglich ist.
    # Wenn aktiviert, findet die Wiederbelebung beim Medikus statt.
    enabled: true

    # Benötigt eine Freischaltung / Berechtigung.
    # Die erforderliche Permission ist in den Job-Konfigurationen / Rollen
    # des Medikus verankert.
    permission: "village.revival.use"

    # Währungstyp für Wiederbelebungskosten.
    # Mögliche Werte: global | local
    currency-type: global

    # Basispreis für die erste Wiederbelebung (in der gewählten Währung)
    base-cost: 100.0

    # Preiserhöhung bei jedem weiteren Tod desselben NPCs
    cost-increase-per-use: 50.0

    # Maximaler Wiederbelebungspreis (Deckelung)
    max-cost: 500.0

    # Abklingzeit nach einer Wiederbelebung in Sekunden (Cooldown)
    base-cooldown-seconds: 300

    # Erhöhung des Cooldowns pro Tod (in Sekunden)
    cooldown-increase-per-use-seconds: 120

    # Maximale Abklingzeit (Deckelung; 1800 Sekunden = 30 Minuten)
    max-cooldown-seconds: 1800


  # ============================================================================
  #  JOB-LAGER (Berufs-spezifischer Inventar-Speicher)
  # ============================================================================
  # Definiert, wie viele Inventar-Slots ein Dorfbewohner pro Beruf hat.
  # Slotanzahl muss Vielfaches von 9 sein (9, 18, 27, 36, 45, 54).
