        work:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 1600
          interruptable: false
          description: "Sammelt Honig"
        rest:
          type: "IDLE"
          location-key: ""
          duration-ticks: 400
          interruptable: true
          description: "Pause"

    # ── BREWER (Brauer) ──────────────────────────────────────────────────────
    brewer:
      display-name: "&aBrauer"
      icon: BREWING_STAND
      # Stellt Zutaten und Festtagswaren her
      produces:
        - GLASS_BOTTLE
        - SUGAR
        - PUMPKIN_PIE
      production-interval-seconds: 480
      required-level: 4
      skin-name: "brewer"
      activity-sequence:
        prepare:
          type: "PREPARE"
          location-key: "storage"
          duration-ticks: 200
          interruptable: true
          description: "Holt Zutaten"
        work:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 1800
          interruptable: false
          description: "Braut"
        rest:
          type: "IDLE"
          location-key: ""
          duration-ticks: 400
          interruptable: true
          description: "Pause"

    # ── FISHER (Fischer) ─────────────────────────────────────────────────────
    fisher:
      display-name: "&aFischer"
      icon: FISHING_ROD
      # Sammelt Fisch und Seetang
      produces:
        - COD
        - SALMON
        - KELP
      production-interval-seconds: 350
      required-level: 2
      skin-name: "fisher"
      activity-sequence:
        travel:
          type: "TRAVEL_TO"
          location-key: "workstation"
          duration-ticks: 300
          interruptable: true
          description: "Geht zum Wasser"
        gather:
          type: "GATHER"    # Sammeln-Typ: NPC fischt/erntet aktiv
          location-key: "workstation"
          duration-ticks: 1800
          interruptable: false
          description: "Fischt"
        rest:
          type: "IDLE"
          location-key: ""
          duration-ticks: 400
          interruptable: true
          description: "Pause"

    # ── HUNTER (Jäger) ──────────────────────────────────────────────────────
    hunter:
      display-name: "&aJäger"
      icon: BOW
      # Jagdbeute und Pfeile
      produces:
        - LEATHER
        - ARROW
        - RABBIT_HIDE
      production-interval-seconds: 380
      required-level: 3
      skin-name: "hunter"
      activity-sequence:
        travel:
          type: "TRAVEL_TO"
          location-key: "workstation"
          duration-ticks: 400
          interruptable: true
          description: "Geht auf die Jagd"
        gather:
          type: "GATHER"
          location-key: "workstation"
          duration-ticks: 1600
