          description: "Jagt"
        rest:
          type: "IDLE"
          location-key: ""
          duration-ticks: 400
          interruptable: true
          description: "Pause"

    # ── MEDIC (Medikus) ──────────────────────────────────────────────────────
    medic:
      display-name: "&aMedikus"
      icon: GOLDEN_APPLE
      produces: []          # Kein Produktionsoutput – heilt stattdessen NPCs
      production-interval-seconds: 0
      required-level: 4
      skin-name: "medic"
      # Ermöglicht dem Medikus das Wiederbeleben von verstorbenen Bürgern
      permission: "village.revival.use"
      activity-sequence:
