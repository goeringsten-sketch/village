# ==============================================================================
#  Village Plugin - Dorfbewohner-Konfiguration (villagers.yml)
# ==============================================================================
#  Konfiguriert Berufe, Tagesabläufe, Nährstoffversorgung, Hunger,
#  Wiederbelebung, Job-Lager und den Skill-Baum der Dorfbewohner.
#
#  ALLGEMEINE HINWEISE:
#  - Material-Namen: Bukkit-Enum (GROSSBUCHSTABEN mit Unterstrichen)
#    → https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Material.html
#  - Zeitangaben in Ticks: 20 Ticks = 1 Sekunde, 1200 Ticks = 1 Minute
#  - Alle Dezimalwerte mit Punkt (z.B. 1.0, nicht 1,0)
# ==============================================================================

villagers:
  # Basis-Maximum an Dorfbewohnern auf Stufe 1 (ohne Upgrades)
  base-max: 5


  # ============================================================================
  #  BERUFE (Professions)
  # ============================================================================
  # Jeder Beruf steuert: Produkte, Produktionsintervall, benötigtes Dorflevel
  # und den täglichen Aktivitätsablauf (activity-sequence).
  #
  # ALLGEMEINE BERUFS-FELDER:
  #   display-name: "<Farbcode+Name>"  - Anzeigename im GUI (&a = grün, etc.)
  #   icon: <Material>                 - Icon im Berufs-Menü
  #   produces: [<Material>, ...]      - Items, die dieser Beruf produziert
  #                                      (Bukkit-Material-Namen als Liste)
  #                                      Leer ([]) = kein Produktionsoutput
  #   production-interval-seconds: <Z> - Sekunden zwischen zwei produzierten Items
  #                                      0 = kein automatisches Produzieren
  #   required-level: <Zahl>           - Mindest-Dorflevel zum Zuweisen dieses Berufs
  #   skin-name: "<Name>"              - Custom NPC Skin (muss auf dem Server verfügbar sein)
  #
  # ────────────────────────────────────────────────────────────────────────────
  # AKTIVITÄTS-SEQUENZ (activity-sequence)
  # ────────────────────────────────────────────────────────────────────────────
  # Definiert den Tagesablauf des Dorfbewohners als geordnete Liste von Phasen.
  # Jede Phase hat einen eindeutigen Schlüssel (frei wählbar) und folgende Felder:
  #
  #   type: <Aktivitäts-Typ>       - Was der NPC tut. Mögliche Werte:
  #       TRAVEL_TO    - Bewegt sich zu einer Position (location-key)
  #       WORK         - Führt Arbeitsaufgaben aus (generiert Produkte)
  #       PREPARE      - Vorbereitungsphase (holt Werkzeuge/Zutaten)
  #       GATHER       - Rohstoffe sammeln (Fischen, Jagen, Ernten)
  #       SLEEP        - Schläft (geht zum Bett, regeneriert Energie)
  #       IDLE         - Freizeit / Pause (kein besonderes Verhalten)
  #       TRADE        - Steht für Spieler-Handel bereit
  #       GET_FOOD     - Sucht Nahrung aus einer Truhe
  #       EAT_FOOD     - Verzehrt die gefundene Nahrung
  #
  #   location-key: "<Schlüssel>"  - Verweist auf Arbeitsplatz in buildings.yml
  #                                  Bekannte Keys: "workstation", "storage", ""
  #                                  Leer ("") = keine feste Position nötig
  #
  #   duration-ticks: <Zahl>       - Dauer dieser Phase in Ticks (20 Ticks = 1s)
  #
  #   interruptable: true | false  - Ob die Phase durch Angriffe/Events unterbrochen werden kann
  #
  #   delay-ticks: <Zahl>          - (optional) Wartezeit vor Phasenstart in Ticks
  #
  #   required-village-level: <Z>  - (optional) Dorflevel, ab dem diese Phase aktiv ist
  #
  #   actions: [<Aktion>, ...]     - (optional) Zusätzliche Aktionen während IDLE:
  #       "get-food"  - NPC holt Essen
  #       "eat-food"  - NPC isst das Essen
  #
  #   description: "<Text>"        - Beschreibung für Debug-Logs und GUI
  # ============================================================================
  professions:

    # ── FARMER (Bauer) ──────────────────────────────────────────────────────
    farmer:
      display-name: "&aBauer"
      icon: WHEAT_SEEDS
      # Produzierte Items (Bukkit-Material-Enum, großgeschrieben)
      produces:
        - WHEAT
        - CARROT
        - POTATO
      production-interval-seconds: 300  # Alle 5 Minuten ein neues Item
      required-level: 1
      skin-name: "farmer"
      activity-sequence:
        wake-up:
          type: "TRAVEL_TO"
          location-key: "workstation"
          duration-ticks: 200
          interruptable: true
          description: "Geht zur Farm"
        work-morning:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 1200
          interruptable: false
          description: "Arbeitet auf der Farm"
        lunch-break:
          type: "IDLE"
          location-key: ""
          duration-ticks: 600
          delay-ticks: 40
          interruptable: true
          required-village-level: 1
          actions:
            - "get-food"
            - "eat-food"
          description: "Mittagspause: Essen holen und essen"
        work-afternoon:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 1200
          interruptable: false
          description: "Arbeitet weiter"
        go-home:
          type: "SLEEP"
          location-key: ""
          duration-ticks: 200
          interruptable: true
          description: "Geht schlafen"

    # ── MINER (Bergarbeiter) ─────────────────────────────────────────────────
    miner:
      display-name: "&aBergarbeiter"
      icon: IRON_PICKAXE
      produces:
        - COBBLESTONE
        - IRON_ORE
        - COAL
      production-interval-seconds: 600  # Alle 10 Minuten
      required-level: 3
      skin-name: "miner"
      activity-sequence:
        prepare:
          type: "PREPARE"
          location-key: "storage"
          duration-ticks: 200
          interruptable: true
          description: "Bereitet Werkzeuge vor"
        work:
          type: "WORK"
          location-key: "workstation"
          duration-ticks: 2400
          interruptable: false
          description: "Abbaut Erz"
        rest:
          type: "IDLE"
          location-key: ""
          duration-ticks: 400
          interruptable: true
          description: "Kurze Pause"

    # ── LUMBERJACK (Holzfäller) ──────────────────────────────────────────────
    lumberjack:
