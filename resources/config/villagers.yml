  # ============================================================================
  #  ERWEITERTE ERNÄHRUNGSMECHANIKEN (Nutrition System)
  # ============================================================================
  nutrition:
    # NPC holt automatisch Nahrung aus Dorftruhen, wenn der Hunger kritisch ist
    auto-feed-from-chest: true

    # Zusätzlicher Nährstoffverbrauch am Ende jeder Aktivitätsphase
    # (Multiplikator auf die Phasendauer)
    activity-end-cost:
      enabled: true
      # Mögliche Aktivitäts-Keys: WORK, PREPARE, GATHER, IDLE, SLEEP,
      #                           WAKE_UP, GET_FOOD, EAT_FOOD, FLEEING, HEALING
      multipliers:
        WORK: 1.0
        PREPARE: 0.5
        GATHER: 0.8
        IDLE: 0.3
        SLEEP: 0.1
        WAKE_UP: 0.4
        GET_FOOD: 0.2
        EAT_FOOD: 0.1

    # Prioritätsliste der bevorzugten Lebensmittel für den Bäcker-NPC
    # (Bäcker isst zuerst selbst produzierte Waren)
    # Alle Werte: Bukkit-Material-Namen
    baker-priority-foods:
      - BREAD
      - CAKE
      - COOKIE
      - PUMPKIN_PIE

    # Aktivitätsbezogene Nährstoff-Multiplikatoren
    # Steuert, wie stark einzelne Nährstoffe pro Aktivitätstyp verbraucht werden.
    # Keys: Aktivitäts-Typ (IDLE, WAKE_UP, WORK, GET_FOOD, EAT_FOOD, FLEEING, HEALING)
    # Sub-Keys: Nährstoff-Keys aus dem 'nutrients'-Abschnitt
    activity-nutrient-multipliers:
      IDLE:
        proteins: 0.70
        fats_good: 0.70
        fats_bad: 0.65
        carbohydrates_single: 0.65
        carbohydrates_double: 0.55
        sugar: 0.55
        omega_3: 0.50
      WAKE_UP:
        proteins: 0.90
        fats_good: 0.85
        fats_bad: 0.80
        carbohydrates_single: 1.00
        carbohydrates_double: 0.95
        sugar: 0.90
        omega_3: 0.80
      WORK:
        proteins: 1.00
        fats_good: 0.90
        fats_bad: 0.85
        carbohydrates_single: 1.20
        carbohydrates_double: 1.10
        sugar: 1.05
        omega_3: 0.75
      GET_FOOD:
        proteins: 0.85
        fats_good: 0.85
        fats_bad: 0.80
        carbohydrates_single: 1.05
        carbohydrates_double: 1.00
        sugar: 0.95
        omega_3: 0.75
      EAT_FOOD:
        proteins: 0.35
        fats_good: 0.30
        fats_bad: 0.25
        carbohydrates_single: 0.30
        carbohydrates_double: 0.25
        sugar: 0.20
        omega_3: 0.20
      FLEEING:
        proteins: 0.85
        fats_good: 1.00
        fats_bad: 0.90
        carbohydrates_single: 1.45
        carbohydrates_double: 1.35
        sugar: 1.65
        omega_3: 0.80
      HEALING:
        proteins: 1.55
        fats_good: 1.00
        fats_bad: 0.85
        carbohydrates_single: 0.90
        carbohydrates_double: 0.85
        sugar: 0.70
        omega_3: 0.75

    # ── Ausgewogene Ernährung (balanced-diet) ────────────────────────────────
    balanced-diet:
      # Ob Nährstoffmangel negative Effekte auf die Produktion hat
      enabled: true
      # Prozentwert (0–100): Unter diesem Nährstoffgehalt gilt ein Mangel
      low-nutrient-threshold: 20
      # Produktionsgeschwindigkeits-Abzug bei Nährstoffmangel (Dezimal; 0.10 = -10%)
      production-penalty: 0.10
      # Prozentwert: Über diesem Zuckerwert treten Hyperaktivitätseffekte auf
      excess-sugar-threshold: 80

    # ── Jahreszeiten-Verbrauch (Temperatureinfluss) ───────────────────────────
    seasonal:
      # Ob Jahreszeiten den Nährstoffverfall beeinflussen
      enabled: true
      # Minecraft-Ticks für Winterbeginn und -ende (Tage im Server-Kalender)
      winter-start: 12000
      winter-end: 6000
      # Verbrauchsmultiplikator im Winter (1.25 = +25% Hunger durch Kälte)
      winter-decay-multiplier: 1.25
      # Verbrauchsmultiplikator im Sommer (0.9 = -10% Hunger)
      summer-decay-multiplier: 0.9

    # ── Berufs-spezifische Verbrauchsmultiplikatoren ──────────────────────────
    # Berufe mit körperlicher Arbeit verbrauchen mehr Nährstoffe.
    # Alle Berufs-Keys aus dem 'professions'-Abschnitt können hier gelistet werden.
    # Werte: < 1.0 = weniger Hunger, > 1.0 = mehr Hunger
    job-decay-multipliers:
      miner: 1.20       # Bergbau = anstrengend
      farmer: 1.00
      lumberjack: 1.05
      carpenter: 1.00
      baker: 0.95       # Bäcker sitzt viel
      blacksmith: 1.10
      mason: 1.05
      beekeeper: 0.95
      brewer: 0.90
      fisher: 1.00
      hunter: 1.10
      guard: 1.10
      merchant: 0.95
      scholar: 0.90     # Gelehrte sitzen viel
      cartographer: 0.90
      medic: 1.00
      courier: 1.05

    # ── Hunger-Warnungen an Spieler ───────────────────────────────────────────
    warnings:
      # Ob Hunger-Warnungen im Chat/Actionbar angezeigt werden
      enabled: true
      # Warnmeldung senden, wenn der Nährstoffwert unter diesen Prozentwert fällt (0–100)
      threshold: 25
      # Mindestabstand in Sekunden zwischen zwei Warnungen desselben NPCs (Cooldown)
      cooldown-seconds: 300

    # ── Nährstoffspeicher-Upgrades ────────────────────────────────────────────
    upgrades:
      # Schlüssel des Upgrades in village.yml (muss dort existieren)
      nutrient-capacity-level-key: nutrient-capacity
      # Zusätzliche Kapazität pro Nährstofftyp pro Upgrade-Stufe
      capacity-per-level: 15


  # ============================================================================
  #  SKILL-BAUM DER DORFBEWOHNER
  # ============================================================================
  skill-tree:
    # Maximales erreichbares Level in einem einzelnen Skill (1–100)
    max-skill-level: 10
    # Benötigte NPC-Erfahrungspunkte (XP) pro Levelup
    # XP wird durch Quests, Handel und Arbeit gewonnen
    xp-per-level: 100
