# ============================================================
#  Village Plugin - Hauptkonfiguration (config.yml)
# ============================================================
#  Globale Einstellungen für Speicher, Sprache, Nachrichten,
#  Gebäudeplatzierung und das Spieler-Ernährungssystem.
#
#  WICHTIG: Alle Material-Namen (Items, Blöcke) müssen exakt dem
#  Minecraft-Enum-Namen entsprechen (Großbuchstaben, Unterstriche).
#  Vollständige Liste: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Material.html
# ============================================================


# ─────────────────────────────────────────────────────────────
# SPEICHER & SPRACHE
# ─────────────────────────────────────────────────────────────
storage:
  # Speicher-Backend für Plugin-Daten.
  # Mögliche Werte:
  #   YAML  - Speicherung in lokalen .yml-Dateien (Standard, kein Setup nötig)
  #   MYSQL - Speicherung in einer MySQL-Datenbank (noch nicht vollständig implementiert)
  type: YAML

# Sprachcode für Sprachdateien unter resources/lang/<code>.yml
# Beispiele: de, en, fr, es
language: de


# ─────────────────────────────────────────────────────────────
# NACHRICHTEN & CHAT-FORMATIERUNG
# ─────────────────────────────────────────────────────────────
# Unterstützt Minecraft-Farbcodes mit '&' als Prefix:
#   &0 Schwarz  &1 Dunkelblau   &2 Dunkelgrün  &3 Dunkelcyan
#   &4 Dunkelrot &5 Dunkelviolett &6 Gold       &7 Grau
#   &8 Dunkelgrau &9 Blau        &a Grün        &b Cyan
#   &c Rot       &d Violett      &e Gelb        &f Weiß
#   &l Fett  &m Durchgestrichen  &n Unterstrichen  &o Kursiv  &r Reset
#
# Unterstützte Platzhalter (je nach Nachricht):
#   %name%    - Name des Dorfes
#   %player%  - Spielername
#   %level%   - Dorflevel
#   %points%  - Anzahl Punkte
#   %upgrade% - Name des Upgrades
#   %size%    - Größenangabe (z.B. bei Grenzfehler)
