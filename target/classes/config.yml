# ─────────────────────────────────────────────────────────────
# GEBÄUDE-PLATZIERUNG
# ─────────────────────────────────────────────────────────────
placement:
  # Zeit in Sekunden, nach der eine ausstehende Gebäude-Platzierung automatisch abbricht.
  # Nach Ablauf muss der Spieler den Befehl erneut ausführen.
  # Empfehlung: 60–300 Sekunden
  timeout-seconds: 60


# ─────────────────────────────────────────────────────────────
# SPIELER-NÄHRSTOFFSYSTEM
# ─────────────────────────────────────────────────────────────
# Steuert den Hunger- und Gesundheitsverlust von SPIELERN (nicht Dorfbewohnern).
# Das System für Dorfbewohner-NPCs wird in villagers.yml konfiguriert.
player-nutrition:
  # Ob das Spieler-Nährstoffsystem aktiv ist
  enabled: true

  # Permission-Knoten, über den der Nährstoff-Typ des Spielers bestimmt wird.
  # Das '%s' wird durch den Wert von 'permission-suffix' ersetzt.
  # Beispiel: "village.player.eating.default" -> Standard-Ernährungsregeln
  permission-node: "village.player.eating.%s"

  # Suffix (Schlüssel) für den Standard-Nährstofftyp.
  # Muss zu einer definierten Permission-Gruppe passen.
  permission-suffix: "default"

  # Nährstoffabnahme pro Minute (in Einheiten; 1.0 = 1 Punkt/Minute)
  decay-per-minute: 1.0

  # Nährstoffwert, ab dem der Spieler Schaden erhält (0–100)
  damage-threshold: 15

  # Intervall in Ticks zwischen zwei Schadens-Events (20 Ticks = 1 Sekunde)
  # 400 Ticks = 20 Sekunden
  damage-interval-ticks: 400

  # Schaden pro Intervall in halben Herzen (0.5 = 1/4 Herz)
  damage-per-interval: 0.5
