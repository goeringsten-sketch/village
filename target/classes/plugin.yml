name: Village
version: 1.0.0
main: com.example.village.VillagePlugin
api-version: '1.20'
authors: [vraisunge]
description: Umfangreiches Dorfsystem mit Gruendung, Gebieten, Leveln, Gebaeuden und Villagern
softdepend: [Vault, WorldEdit, WorldGuard, Citizens, ProtocolLib, BlueMap]
commands:
  village:
    description: Haupt-Dorf-Befehl
    usage: /village
    aliases: [dorf, v]
  trade:
    description: Öffnet das Handelsmenü für lokale, externe, P2P oder Marktplatz-Trades
    usage: /trade <balance|local|external|player|shop|history>
    aliases: [handel]
  sendmoney:
    description: Sendet globales Geld an einen Spieler
    usage: /sendmoney <Spieler> <Betrag>
  balance:
    description: Zeigt globales Guthaben
    usage: /balance [Spieler]
  balances:
    description: Zeigt globale Guthabenliste
    usage: /balances
permissions:
  village.admin:
    default: op
    description: Voller Admin-Zugriff auf alle Dorf-Befehle
  village.admin.trade:
    default: op
    description: Ignoriert Trade-Timeout und maximale Trade-Entfernung
  village.create:
    default: true
    description: Erlaubt das Gruenden eines Dorfes
  village.manage:
    default: false
    description: Erlaubt Dorfverwaltung (Upgrades, Gebaeude etc.)
  village.bypass:
    default: op
    description: Umgeht alle Dorf-Einschraenkungen
