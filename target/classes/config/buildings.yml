# ==============================================================================
#  Village Plugin - Gebäude-Konfiguration (buildings.yml)
# ==============================================================================
#  Definiert alle Gebäudetypen, Kategorien, Baukosten, Validierungsregeln
#  und globale Gebäude-Engine-Einstellungen.
#
#  MATERIAL-NAMEN: Bukkit-Enum (GROSSBUCHSTABEN mit Unterstrichen)
#    → https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Material.html
#
#  ──────────────────────────────────────────────────────────────────────────
#  GEBÄUDE-FELD-REFERENZ (gilt für alle Gebäude-Einträge):
#
#   name: "<Text>"               - Anzeigename im Gebäude-GUI
#   description: "<Text>"        - Kurzbeschreibung (Tooltip im Menü)
#   permission: "<node>"         - Permission zum Bauen dieses Gebäudes
#   icon: <Material>             - Icon im Gebäude-Menü
#   show_in_menu: true|false     - Ob das Gebäude im Bau-Menü angezeigt wird
#   requires_village_level: <Z>  - Mindest-Dorflevel zum Bauen
#
#   validation_mode: <Modus>     - Wie das Gebäude validiert wird:
#       schematic    → Plugin vergleicht mit WorldEdit-Schematic-Datei
#       block_check  → Plugin prüft bestimmte Blöcke im Bereich
#
#   schematic: "<datei.schem>"   - Schematic-Dateiname (nur bei validation_mode: schematic)
#
#   required_blocks:             - Pflichtblöcke im Bereich (block_check)
#     <Material>: <Mindestanzahl>
#
#   required_block_percentage:   - Prozentuale Mindestabdeckung eines Blocktyps
#     block: <Material>
#     percentage: <0-100>
#
#   workstation_blocks: [<M>, ..] - Blöcke, die als Arbeitsstation für NPCs gelten
#                                   (Bukkit-Material-Namen als Liste)
#
#   additional_workstation_blocks: - Zusätzliche benannte Arbeitsstationen
#     <name>:
#       type: <Material>          - Blocktyp
#       label: "<Text>"           - Anzeigelabel
#       required: true|false      - Ob dieser Block vorhanden sein MUSS
#       count_min: <Zahl>         - Mindestanzahl
#       count_max: <Zahl>         - Maximalanzahl
#       public: true|false        - Für alle Spieler zugänglich
#       villager_accessible: true|false  - NPCs können darauf zugreifen
#
#   area:                         - Flächenberechnung des Gebäudes
#     shape: <Form>               - Mögliche Werte:
#         circle           → Kreisförmig (min_radius, max_radius)
#         rectangle        → Rechteckig (min_size "BxH", max_size "BxH")
#         hollow_structure → Hohlkörper/Gebäude-Innenraum (min/max_interior_volume)
#     min_radius / max_radius     - (nur bei circle)
#     min_size / max_size         - (nur bei rectangle, Format: "BreitexTiefe")
#     min_interior_volume / max_interior_volume - (nur bei hollow_structure)
#
#   chest:                        - Truhen-Konfiguration
#     initial_slots: <9|18|27..>  - Start-Inventarslots (Vielfache von 9)
#     max_upgradeable_slots: <Z>  - Maximum nach Upgrades
#     public: true|false          - Für alle Spieler zugänglich
#     villager_accessible: true|false  - NPCs können zugreifen
#
#   villager_slots: <Zahl>        - Anzahl NPC-Arbeitsplätze dieses Gebäudes
#
#   passive_effects:              - Passive Boni durch dieses Gebäude
#     sleep_slots: <Zahl>         - Schlafplätze für NPCs (Betten)
#
#   type: <Gebäudetyp>            - Spezialtyp (nur wenn abweichend von standard):
#       path     → Pfad/Weg (Spieler läuft ihn ab)
#       area     → Bezirk / Gebietsbereich
#       outpost  → Außenposten (außerhalb des Dorfgebiets)
#
#   parent: <gebäude-key>         - Übergeordnetes Gebäude (muss zuerst gebaut sein)
#
#   build_cost:                   - Baukosten
#     items: { <Material>: <Z> }  - Benötigte Items
#     money: <Zahl>               - Kosten in globaler Währung
#     money_local: <Zahl>         - (optional) Kosten in lokaler Dorfwährung
#
#   upgrades:                     - Verfügbare Ausbaustufen
#     <upgrade-key>:
#       name: "<Text>"
#       permission: "<node>"
#       requires_village_level: <Z>
#       achievement: "<Text>"     - Benachrichtigung beim Freischalten
#       commands: ["<cmd>", ...]  - Konsolenbefehle beim Freischalten
#       build_cost: { ... }       - Upgrade-Kosten (wie build_cost)
#       upgrades_to: <gebäude-key> - Wandelt das Gebäude in einen anderen Typ um
#
#   recipes:                      - Produktionsrezepte dieses Gebäudes
#     <rezept-key>:
#       inputs: { <Material>: <Z> }  - Benötigte Eingabe-Items
#       outputs: { <Material>: <Z> } - Produzierte Ausgabe-Items
#       duration_seconds: <Zahl>     - Produktionsdauer in Sekunden
#       required_villager_job: <Job> - Benötigter Beruf des NPCs (Großbuchstaben)
#       required_building_level: <Z> - Mindest-Gebäudestufe
#
#  PFAD-SPEZIFISCHE FELDER (type: path):
#   path:
#     width: <Zahl>                - Breite des Pfades in Blöcken
#     width_upgradeable: true|false - Ob die Breite per Upgrade vergrößert werden kann
#     max_width: <Zahl>            - Maximale Breite nach Upgrades
#     visualize_border_block: <M>  - Fake-Block zur Visualisierung der Pfadkante
#     surface_check_mode: <Modus>  - Mögliche Werte: skylight | all
#     required_surface_block: <M>  - Pflicht-Oberflächenblock (z.B. DIRT_PATH)
#     required_surface_percentage: <0-100>  - Mindestprozentsatz Pflichtblock
#     valid_surface_blocks: [<M>,..]  - Erlaubte Oberflächenblöcke
#     valid_base_blocks: [<M>, ..]    - Erlaubte Untergrundblöcke
#     speed_effect:                   - Geschwindigkeitseffekt für Spieler auf dem Pfad
#       amplifier: <0-4>             - Stärke des Effekts (0 = keine Erhöhung, 4 = max)
#       duration_after_leave_ticks: <Z> - Wie lange der Effekt nach Verlassen anhält
# ==============================================================================

settings:
  # Modus für die Oberflächenerkennung bei Pfaden.
  # Mögliche Werte:
  #   skylight - Nur Blöcke mit direktem Himmelsicht werden geprüft (empfohlen)
  #   all      - Alle Blöcke im Bereich werden geprüft (langsamer)
  path_surface_mode: skylight

  # Mindest-Skylight-Level (0–15) für einen Block, um als Pfadoberfläche zu gelten
  # 1 = minimales Tageslicht genügt; 15 = nur vollständig unbedeckte Blöcke
  path_surface_min_skylight: 1

  # Produktionsbonus pro Gebäude-Tier (Upgradestufe) als Dezimalwert
  # 0.10 = +10% pro Tier. Bei Tier 3 = +30% Gesamtbonus.
  production_level_bonus_per_tier: 0.10

  # Maximaler Radius in Blöcken, in dem ein NPC eine Truhe zum Befüllen sucht
  villager_fetch_radius: 64

  # Schematic-spezifische Einstellungen (nur für validation_mode: schematic)
  schematic:
    foundation-stretch:
      # Ob das Plugin automatisch Fundamentblöcke unter dem Gebäude platziert
      enabled: true
      # Maximale Tiefe des Fundaments in Blöcken
      max-depth: 8
      # Material für das automatisch generierte Fundament
      # Bukkit-Material-Name
      material: COBBLESTONE

  # Ästhetik-Bewertungs-System: Bewertet Gebäude nach Materialkombinationen
  aesthetic_scoring:
    # Ob das Ästhetik-System aktiv ist
    enabled: true
    # Mindest-Score für einen Produktionsbonus (0–100)
    min_score_for_bonus: 61
    # Score-Grenze, unter der ein Straf-Malus eingreift (0–100)
    penalty_threshold: 30
    # Bonus bei mittlerem Score (min_score_for_bonus bis 80) als Dezimalwert
    mid_bonus: 0.10
    # Bonus bei hohem Score (über 80) als Dezimalwert (0.20 = +20%)
    high_bonus: 0.20
    # Malus bei niedrigem Score (unter penalty_threshold) als Dezimalwert
    low_penalty: 0.20
    # Paare von gut kombinierenden Materialien (erhöhen den Score)
    # Format: [<Material1>, <Material2>]
    # Beliebig viele Paare möglich
    material_pairs:
      - [OAK_LOG, COBBLESTONE]
      - [BRICKS, DARK_OAK_PLANKS]

# Reihenfolge und sichtbare Ordner im GUI (optional)
menu_categories:
  - Dorfzentrum
  - Allgemeine Gebäude
  - Wohnen
  - Pfade & Wege
  - Produktion & Verarbeitung
  - Fabrik & Verarbeitung
  - Handel & Logistik
  - Wissenschaft & Forschung
  - Medizin & Apotheke
  - Zerstreuung & Kultur
  - Sicherheit & Verteidigung
  - Außenposten
  - Bezirke & Erweiterungen

categories:
  general:
    name: "Allgemeine Gebäude"
    permission: "village.building.general"
    icon: OAK_PLANKS
    buildings:

      dorfzentrum:
        name: "Dorfzentrum"
        description: "Das Herz des Dorfes."
        permission: "village.building.general.dorfzentrum"
        icon: BELL
        show_in_menu: false
        requires_village_level: 1
        max_instances: 1
        validation_mode: schematic
        schematic: "dorfzentrum.schem"
        workstation_blocks: [BELL]
        area:
          shape: circle
          min_radius: 5
          max_radius: 10
        villager_slots: 0
        build_cost:
          items: { OAK_PLANKS: 32, STONE: 16 }
          money: 0
        upgrades:
          tier_2:
            name: "Erweitertes Dorfzentrum"
            permission: "village.building.general.dorfzentrum.upgrade.2"
            requires_village_level: 3
            achievement: "Upgrade Dorfzentrum freigeschaltet!"
            commands:
              - "say Das Dorfzentrum wurde erweitert!"
            build_cost:
              items: { STONE_BRICKS: 64, OAK_LOG: 32 }
              money: 100
          tier_3:
            name: "Prächtiges Dorfzentrum"
            permission: "village.building.general.dorfzentrum.upgrade.3"
            requires_village_level: 6
            achievement: "Großes Dorfzentrum freigeschaltet!"
            commands:
              - "say Das Dorfzentrum ist nun prächtig!"
            build_cost:
              items: { CHISELED_STONE_BRICKS: 64, IRON_INGOT: 16 }
              money: 500
          small_storage:
            name: "Kleines Lager (Upgrade)"
            permission: "village.building.general.dorfzentrum.upgrade.small_storage"
            requires_village_level: 2
            achievement: "Kleines Lager freigeschaltet!"
            commands:
              - "say Kleines Lager freigeschaltet für %village%!"
            chest:
              initial_slots: 9
              max_upgradeable_slots: 54
              public: true
              villager_accessible: true
            build_cost:
              items: { OAK_LOG: 16, OAK_PLANKS: 32 }
              money: 0

      dorfbrunnen:
        name: "Dorfbrunnen"
        description: "Zentraler Treffpunkt für Dorfbewohner."
        permission: "village.building.general.dorfbrunnen"
        icon: WATER_BUCKET
        requires_village_level: 1
        validation_mode: block_check
        required_blocks:
          WATER: 4
        workstation_blocks: [BELL]
        area:
          shape: circle
          min_radius: 3
          max_radius: 6
        build_cost:
          items: { STONE: 32, WATER_BUCKET: 1 }
          money: 0
          money_local: 5

      # kleines_lager wurde in ein Upgrade des Dorfzentrums verschoben (siehe dorfzentrum.upgrades.small_storage)

      marktplatz:
        name: "Marktplatz"
        description: "Zentraler Handelsort im Dorfzentrum."
        permission: "village.building.general.marktplatz"
        icon: EMERALD
        requires_village_level: 2
        max_instances: 1
        validation_mode: schematic
        schematic: "marktplatz.schem"
        workstation_blocks: [OAK_SIGN]
        additional_workstation_blocks:
          kiste:
            type: CHEST
            label: "Handelstruhe"
            required: true
            count_min: 1
            count_max: 2
            public: true
            villager_accessible: true
        area:
          shape: rectangle
          min_size: "5x5"
          max_size: "15x15"
        chest:
          initial_slots: 18
          max_upgradeable_slots: 54
        villager_slots: 2
        build_cost:
          items: { OAK_PLANKS: 64, EMERALD: 5 }
          money: 100

      laterne:
        name: "Laterne"
        description: "Beleuchtung für die Wege."
        permission: "village.building.general.laterne"
        icon: LANTERN
        requires_village_level: 1
        validation_mode: block_check
        required_blocks:
          LANTERN: 1
        workstation_blocks: [LANTERN]
        area:
          shape: rectangle
          min_size: "1x1"
          max_size: "2x2"
        build_cost:
          items: { LANTERN: 1, COBBLESTONE_WALL: 2 }
          money: 5

      hafen:
        name: "Hafen"
        description: "Anlegestelle für Boote und Warenumschlag."
        permission: "village.building.general.hafen"
        icon: OAK_BOAT
        requires_village_level: 3
        validation_mode: schematic
        schematic: "hafen.schem"
        workstation_blocks: [BARREL]
        area:
          shape: rectangle
          min_size: "6x6"
          max_size: "15x20"
        build_cost:
          items: { OAK_LOG: 32, OAK_PLANKS: 64, BARREL: 2 }
          money: 200

      deko_forst:
        name: "Forst"
        description: "Waldgebiet unter freiem Himmel mit Bäumen."
        permission: "village.building.general.forst"
        icon: OAK_LOG
        requires_village_level: 2
        validation_mode: block_check
        required_blocks:
          OAK_LOG: 5
          SPRUCE_LOG: 5
          BIRCH_LOG: 5
        required_block_percentage:
          block: OAK_LEAVES
          percentage: 40
        workstation_blocks: [OAK_LOG, SPRUCE_LOG, BIRCH_LOG, DARK_OAK_LOG]
        area:
          shape: rectangle
          min_size: "5x5"
          max_size: "50x50"
        build_cost:
          items: { SAPLING: 8 }
          money: 50
          money_local: 20

      deko_acker:
        name: "Acker"
        description: "Anbaufläche mit Wasser und Grasblöcken."
        permission: "village.building.general.acker"
        icon: WHEAT
        requires_village_level: 2
        validation_mode: block_check
        required_blocks:
          WATER: 1
          FARMLAND: 8
        workstation_blocks: [FARMLAND, WATER, COMPOSTER]
        area:
          shape: rectangle
          min_size: "3x3"
          max_size: "20x20"
        build_cost:
          items: { WATER_BUCKET: 1, WOODEN_HOE: 4 }
          money: 30
          money_local: 10

      deko_beet:
        name: "Blumenbeet"
        description: "Pflanzenbeet für Blumen und Pilze."
        permission: "village.building.general.beet"
        icon: POPPY
        requires_village_level: 1
        validation_mode: block_check
        required_blocks:
          GRASS_BLOCK: 4
          DIRT: 4
        workstation_blocks: [GRASS_BLOCK, DIRT, COARSE_DIRT]
        area:
          shape: rectangle
          min_size: "2x2"
          max_size: "10x10"
        build_cost:
          items: { POPPY: 4, DANDELION: 4 }
          money: 20

      deko_tierzucht:
        name: "Tierzucht"
        description: "Einfriedetes Gebiet für Tiere mit Zäunen und Tor."
        permission: "village.building.general.tierzucht"
        icon: CHICKEN_SPAWN_EGG
        requires_village_level: 3
        validation_mode: block_check
        required_blocks:
          OAK_FENCE: 8
          OAK_FENCE_GATE: 1
        workstation_blocks: [OAK_FENCE, OAK_FENCE_GATE]
        area:
          shape: circle
          min_radius: 3
          max_radius: 15
        build_cost:
          items: { OAK_LOG: 16, OAK_FENCE: 8, OAK_FENCE_GATE: 1, HAY_BLOCK: 4 }
          money: 100

  wohnen:
    name: "Wohnen"
    permission: "village.building.wohnen"
    icon: RED_BED
    buildings:

      baracke:
        name: "Notunterkunft"
        description: "Einfache Unterkunft aus beliebigen Blöcken - Raum mit Wänden, Decke und Boden nötig."
        permission: "village.building.wohnen.baracke"
        icon: OAK_DOOR
        requires_village_level: 1
        validation_mode: block_check
        area:
          shape: hollow_structure
          min_interior_volume: 8
          max_interior_volume: 200
        workstation_blocks: [WHITE_BED, ORANGE_BED, MAGENTA_BED, LIGHT_BLUE_BED, YELLOW_BED, LIME_BED, PINK_BED, GRAY_BED, LIGHT_GRAY_BED, CYAN_BED, PURPLE_BED, BLUE_BED, BROWN_BED, GREEN_BED, RED_BED, BLACK_BED]
        villager_slots: 2
        passive_effects:
          sleep_slots: 2
        build_cost:
          items: { OAK_LOG: 8, OAK_PLANKS: 16 }
          money: 0
        upgrades:
          tier_2:
            name: "Ausgebaute Notunterkunft"
            permission: "village.building.wohnen.baracke.upgrade.2"
            passive_effects: { sleep_slots: 4 }
            villager_slots: 4
            build_cost: { items: { OAK_PLANKS: 64, GLASS: 4, OAK_DOOR: 2 }, money: 50 }

      wohnhaus:
        name: "Wohnhaus"
        description: "Gemütliches Wohnhaus für Bürger. (WB: Bett, Truhe)"
        permission: "village.building.wohnen.wohnhaus"
        icon: RED_BED
        requires_village_level: 2
        max_instances: 5
        validation_mode: schematic
        schematic: "wohnhaus.schem"
        workstation_blocks: [WHITE_BED, ORANGE_BED, MAGENTA_BED, LIGHT_BLUE_BED, YELLOW_BED, LIME_BED, PINK_BED, GRAY_BED, LIGHT_GRAY_BED, CYAN_BED, PURPLE_BED, BLUE_BED, BROWN_BED, GREEN_BED, RED_BED, BLACK_BED]
        additional_workstation_blocks:
          truhe:
            type: CHEST
            label: "Wohntruhe"
            required: true
            count_min: 1
            count_max: 4
        area:
          shape: rectangle
          min_size: "4x4"
          max_size: "10x10"
        chest:
          initial_slots: 9
          max_upgradeable_slots: 27
        villager_slots: 2
        passive_effects:
          sleep_slots: 2
        build_cost:
          items: { OAK_PLANKS: 64, GLASS: 4, RED_BED: 2 }
          money: 50
        upgrades:
          tier_2:
            name: "Großes Wohnhaus"
            permission: "village.building.wohnen.wohnhaus.upgrade.2"
            achievement: "Wohnhaus verbessert!"
            commands:
              - "say Das Wohnhaus bietet jetzt noch mehr Platz."
            passive_effects: { sleep_slots: 4 }
            villager_slots: 4
            build_cost: { items: { STONE_BRICKS: 32, GLASS: 4, WHITE_BED: 2 }, money: 100 }

  # -----------------------------------------------------------
  #  PFADE (paths)
  # -----------------------------------------------------------
  paths:
    name: "Pfade & Wege"
    permission: "village.building.paths"
    icon: DIRT_PATH
    buildings:

      trampelpfad:
        name: "Trampelpfad"
        description: "3 Blöcke breiter Pfad. Villager laufen ihn frei."
        permission: "village.building.paths.trampelpfad"
        icon: DIRT_PATH
        requires_village_level: 1
        type: path
        path:
          width: 3
          visualize_border_block: YELLOW_CONCRETE_POWDER
          surface_check_mode: skylight
          required_surface_block: DIRT_PATH
          required_surface_percentage: 60
          valid_surface_blocks: [DIRT_PATH]
          valid_base_blocks: [DIRT, DIRT_PATH, GRASS_BLOCK, COARSE_DIRT]
          speed_effect:
            amplifier: 0
            duration_after_leave_ticks: 60
        build_cost:
          items: { STICK: 4 }
          money: 0
        upgrades:
          tier_2:
            name: "Befestigter Trampelpfad"
            permission: "village.building.paths.trampelpfad.upgrade.2"
            path:
              speed_effect: { amplifier: 0, duration_after_leave_ticks: 100 }
            build_cost: { items: { GRAVEL: 16 }, money: 10 }
          tier_3:
            name: "-> Straße"
            permission: "village.building.paths.trampelpfad.upgrade.3"
            upgrades_to: strasse
            build_cost: { items: { COBBLESTONE: 64, GRAVEL: 32 }, money: 100 }

      strasse:
        name: "Straße"
        description: "Gepflasterte Straße. Schnellerer Transport."
        permission: "village.building.paths.strasse"
        icon: COBBLESTONE
        requires_village_level: 2
        type: path
        path:
          width: 3
          width_upgradeable: true
          max_width: 5
          visualize_border_block: WHITE_CONCRETE_POWDER
          surface_check_mode: skylight
          required_surface_block: COBBLESTONE
          required_surface_percentage: 70
          valid_surface_blocks: [COBBLESTONE, STONE_BRICKS, GRAVEL, STONE_SLAB]
          speed_effect:
            amplifier: 1
            duration_after_leave_ticks: 120
        build_cost:
          items: { COBBLESTONE: 32 }
          money: 50
        upgrades:
          tier_2:
            name: "Gepflasterte Straße (5 breit)"
            permission: "village.building.paths.strasse.upgrade.2"
            path:
              width: 5
              speed_effect: { amplifier: 1, duration_after_leave_ticks: 200 }
            build_cost: { items: { STONE_BRICKS: 64, IRON_INGOT: 4 }, money: 200 }
          tier_3:
            name: "-> Schiene"
            permission: "village.building.paths.strasse.upgrade.3"
            upgrades_to: schiene
            build_cost: { items: { RAIL: 64, IRON_INGOT: 8 }, money: 300 }

      schiene:
        name: "Schiene"
        description: "Schienenweg für den Lorentransport."
        permission: "village.building.paths.schiene"
        icon: RAIL
        requires_village_level: 4
        type: path
        path:
          width: 1
          visualize_border_block: RED_CONCRETE_POWDER
          surface_check_mode: skylight
          required_surface_block: RAIL
          required_surface_percentage: 90
          valid_surface_blocks: [RAIL, POWERED_RAIL, DETECTOR_RAIL, ACTIVATOR_RAIL]
          valid_base_blocks: [GRAVEL, STONE_BRICKS, OAK_PLANKS, COBBLESTONE]
        build_cost:
          items: { RAIL: 16 }
          money: 100

      bruecke:
        name: "Brücke"
        description: "Überbrückt Gewässer und Gräben."
        permission: "village.building.paths.bruecke"
        icon: OAK_SLAB
        requires_village_level: 1
        validation_mode: block_check
        required_blocks:
          OAK_SLAB: 10
        workstation_blocks: [BELL]
        area:
          shape: rectangle
          min_size: "3x5"
          max_size: "6x30"
        build_cost:
          items: { OAK_PLANKS: 32, COBBLESTONE: 32 }
          money: 50

  # -----------------------------------------------------------
  #  BEZIRK (district)
  # -----------------------------------------------------------
  production:
    name: "Produktion & Verarbeitung"
    permission: "village.building.production"
    icon: CRAFTING_TABLE
    buildings:

      forst:
        name: "Forst"
        description: "Großes Waldgebiet zur Baumzucht."
        permission: "village.building.production.forst"
        icon: OAK_SAPLING
        requires_village_level: 2
        validation_mode: block_check
        required_blocks:
          DIRT: 16
        required_block_percentage:
          block: OAK_LOG
          percentage: 10
        workstation_blocks: [BELL]
        area:
          shape: rectangle
          min_size: "10x10"
          max_size: "30x30"
        build_cost:
          items: { OAK_SAPLING: 16, BONE_MEAL: 8 }
