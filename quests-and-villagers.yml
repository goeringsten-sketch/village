# ============================================================
# Quests-System Konfiguration
# ============================================================
quests:
  starter-quest-1:
    title: "Willkommen!"
    description: "Sammle 10 Holz für das Dorf."
    objective: "10x OAK_LOG sammeln"
    required-village-level: 1
    min-reputation: -100
    is-daily: false
    reward:
      village-points: 50
      money: 100
      villager-xp: 10
      items:
        EMERALD: 2

  recruitment-quest:
    title: "Neue Bürger"
    description: "Rekrutiere einen Dorfbewohner."
    objective: "Rekrutiere einen Villager"
    required-village-level: 5
    min-reputation: 0
    is-daily: false
    reward:
      village-points: 100
      money: 250
      villager-xp: 20
      items: {}
    prerequisites:
      - starter-quest-1

  trade-quest:
    title: "Handel lernen"
    description: "Handelt mit 5 verschiedenen Villagern."
    objective: "5x mit NPCs handeln"
    required-village-level: 3
    min-reputation: -50
    is-daily: true
    reward:
      village-points: 25
      money: 75
      villager-xp: 5
      items: {}

  farming-mission:
    title: "Ernte"
    description: "Helfe dem Bauern mit der Ernte."
    objective: "50x Weizen sammeln"
    required-village-level: 2
    min-reputation: -30
    is-daily: true
    reward:
      village-points: 30
      money: 50
      villager-xp: 8
      items: {}

